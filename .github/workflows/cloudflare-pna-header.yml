name: Cloudflare PNA response header

on:
  workflow_dispatch:
    inputs:
      http_hosts:
        description: >
          Comma-separated API hostnames that are Cloudflare-proxied (orange cloud),
          e.g. api.example.com. Leave empty to use repository variable CLOUDFLARE_PNA_HTTP_HOSTS.
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Upsert Access-Control-Allow-Private-Network transform rule
        env:
          CLOUDFLARE_RULESETS_API_TOKEN: ${{ secrets.CLOUDFLARE_RULESETS_API_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_ZONE_NAME: ${{ vars.CLOUDFLARE_ZONE_NAME }}
          CLOUDFLARE_PNA_HTTP_HOSTS: ${{ inputs.http_hosts || vars.CLOUDFLARE_PNA_HTTP_HOSTS }}
        run: python3 scripts/cloudflare_apply_private_network_access_rule.py
