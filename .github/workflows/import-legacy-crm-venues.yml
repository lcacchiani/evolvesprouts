# Manual import of legacy CRM venues from a MariaDB SQL dump into PostgreSQL `locations`.
#
# Flow: download the .sql (HTTPS URL or secret) on the runner → enforce ≤ 2 MB →
# upload to the dedicated import S3 bucket → invoke `EvolvesproutsImportLegacyVenuesFunction`
# with `{ s3_bucket, s3_key, dry_run }`. The Lambda reads the object, parses mysqldump-style
# INSERTs, and writes to Aurora via RDS Proxy + IAM as `evolvesprouts_admin`.
#
# **Production only** — the workflow exits unless the selected GitHub Environment name is
# `production` (staging is out of scope for this path).
#
# GitHub Environment (production) configuration:
# - vars: `AWS_ACCOUNT_ID`, `AWS_REGION`, `IMPORT_DUMP_BUCKET_NAME`, `IMPORT_LAMBDA_FUNCTION_NAME`
#   (`IMPORT_LAMBDA_FUNCTION_NAME` must match CDK `name("EvolvesproutsImportLegacyVenuesFunction")`,
#   e.g. `evolvesprouts-EvolvesproutsImportLegacyVenuesFunction`).
# - secrets (optional): `IMPORT_LEGACY_CRM_SQL_URL` — used when `sql_download_url` input is empty.
#
# IAM: `GitHubActionsRole` must allow `s3:PutObject` on the import bucket prefix and
# `lambda:InvokeFunction` on the import Lambda ARN (see `docs/architecture/aws-assets-map.md`).
#
# Security: presigned URLs are sensitive. Do not echo download URLs in logs.

name: Import legacy CRM venues

on:
  workflow_dispatch:
    inputs:
      sql_download_url:
        description: >
          HTTPS URL to the MariaDB .sql backup (optional if secret IMPORT_LEGACY_CRM_SQL_URL is set).
        required: false
        type: string
      dry_run:
        description: If true, parse and resolve areas but do not insert into the database.
        required: false
        default: true
        type: boolean
      environment:
        description: >
          GitHub Environment (must be `production` for this workflow).
        required: true
        type: environment

concurrency:
  group: import-legacy-crm-venues
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  import:
    name: Upload dump and run import Lambda
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Validate environment (production only)
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          set -euo pipefail
          if [ "$ENVIRONMENT" != "production" ]; then
            echo "This workflow is restricted to the production environment." >&2
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        if: ${{ vars.AWS_ACCOUNT_ID != '' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: import-legacy-venues-${{ github.run_id }}

      - name: Download SQL dump
        env:
          INPUT_URL: ${{ github.event.inputs.sql_download_url }}
          SECRET_URL: ${{ secrets.IMPORT_LEGACY_CRM_SQL_URL }}
        run: |
          set -euo pipefail
          URL="${INPUT_URL:-}"
          if [ -z "${URL// }" ]; then
            URL="${SECRET_URL:-}"
          fi
          if [ -z "${URL// }" ]; then
            echo "Provide sql_download_url or set repository secret IMPORT_LEGACY_CRM_SQL_URL." >&2
            exit 1
          fi
          curl -fsSL "$URL" -o "${RUNNER_TEMP}/legacy_crm_venues.sql"
          SIZE=$(wc -c < "${RUNNER_TEMP}/legacy_crm_venues.sql")
          echo "Downloaded SQL dump ($SIZE bytes)"
          if [ "$SIZE" -gt 2097152 ]; then
            echo "Dump exceeds 2 MB; reduce size or split the import." >&2
            exit 1
          fi

      - name: Upload dump to S3
        env:
          IMPORT_DUMP_BUCKET: ${{ vars.IMPORT_DUMP_BUCKET_NAME }}
        run: |
          set -euo pipefail
          if [ -z "${IMPORT_DUMP_BUCKET:-}" ]; then
            echo "Set IMPORT_DUMP_BUCKET_NAME on the GitHub environment." >&2
            exit 1
          fi
          KEY="dumps/${GITHUB_RUN_ID}/legacy_crm_venues.sql"
          aws s3 cp "${RUNNER_TEMP}/legacy_crm_venues.sql" \
            "s3://${IMPORT_DUMP_BUCKET}/${KEY}" \
            --sse AES256
          echo "IMPORT_S3_KEY=${KEY}" >> "${GITHUB_ENV}"

      - name: Invoke import Lambda
        env:
          BUCKET: ${{ vars.IMPORT_DUMP_BUCKET_NAME }}
          KEY: ${{ env.IMPORT_S3_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          FUNC: ${{ vars.IMPORT_LAMBDA_FUNCTION_NAME }}
        run: |
          set -euo pipefail
          if [ -z "${FUNC:-}" ]; then
            echo "Set IMPORT_LAMBDA_FUNCTION_NAME on the GitHub environment." >&2
            exit 1
          fi
          if [ "${DRY_RUN}" = "true" ]; then
            DRY_JSON=true
          else
            DRY_JSON=false
          fi
          PAYLOAD=$(jq -cn --arg b "$BUCKET" --arg k "$KEY" --argjson d "$DRY_JSON" \
            '{s3_bucket:$b, s3_key:$k, dry_run:$d}')
          META=$(aws lambda invoke \
            --function-name "$FUNC" \
            --cli-binary-format raw-in-base64-out \
            --payload "$PAYLOAD" \
            --log-type Tail \
            --output json \
            lambda-response-payload.json)
          echo "$META" | jq .
          echo "## Lambda function payload" >> "${GITHUB_STEP_SUMMARY}"
          jq -e '.' lambda-response-payload.json >> "${GITHUB_STEP_SUMMARY}"
          if echo "$META" | jq -e '.FunctionError != null' >/dev/null 2>&1; then
            echo "Lambda reported FunctionError" >&2
            echo "$META" >&2
            cat lambda-response-payload.json >&2
            exit 1
          fi
          if jq -e 'has("errorMessage")' lambda-response-payload.json >/dev/null 2>&1; then
            echo "Lambda payload contains errorMessage" >&2
            cat lambda-response-payload.json >&2
            exit 1
          fi
          LOG_B64=$(echo "$META" | jq -r '.LogResult // empty')
          if [ -n "$LOG_B64" ]; then
            echo "" >> "${GITHUB_STEP_SUMMARY}"
            echo "### CloudWatch Logs (tail, base64-decoded)" >> "${GITHUB_STEP_SUMMARY}"
            echo "$LOG_B64" | base64 -d >> "${GITHUB_STEP_SUMMARY}" || true
          fi
