name: Lighthouse Public Website

on:
  workflow_dispatch:
    inputs:
      page_paths:
        description: 'Comma/newline-separated page paths or full URLs to audit (e.g. /en/, /en/about-us)'
        required: false
        default: '/en/,/zh-CN/,/zh-HK/'

permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve public site origin from infrastructure params
        id: resolve_public_site_origin
        run: |
          SITE_DOMAIN="$(python3 -c "import json; from pathlib import Path; params=json.loads(Path('backend/infrastructure/params/production.json').read_text(encoding='utf-8')); print(str(params.get('PublicWwwDomainName', '')).strip())")"
          if [ -z "$SITE_DOMAIN" ]; then
            echo "PublicWwwDomainName is required in backend/infrastructure/params/production.json"
            exit 1
          fi
          echo "site_origin=https://${SITE_DOMAIN}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: apps/public_www/package-lock.json

      - name: Restore Next.js build cache (public_www)
        uses: actions/cache@v5
        with:
          path: apps/public_www/.next/cache
          key: ${{ runner.os }}-nextjs-public-www-${{ hashFiles('apps/public_www/package-lock.json') }}-${{ hashFiles('apps/public_www/src/**/*.{js,jsx,ts,tsx}', 'apps/public_www/scripts/**/*.mjs', 'apps/public_www/next.config.*') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-public-www-${{ hashFiles('apps/public_www/package-lock.json') }}-

      - name: Install dependencies
        working-directory: apps/public_www
        run: npm ci

      - name: Build static website
        working-directory: apps/public_www
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          NEXT_PUBLIC_SITE_ORIGIN: ${{ steps.resolve_public_site_origin.outputs.site_origin }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          NEXT_PUBLIC_FPS_MERCHANT_NAME: ${{ vars.NEXT_PUBLIC_FPS_MERCHANT_NAME }}
          NEXT_PUBLIC_FPS_MOBILE_NUMBER: ${{ vars.NEXT_PUBLIC_FPS_MOBILE_NUMBER }}
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_EVENTS_SOURCE: ${{ vars.NEXT_PUBLIC_EVENTS_SOURCE }}
          NEXT_PUBLIC_WWW_PROXY_ALLOWED_HOSTS: ${{ vars.NEXT_PUBLIC_WWW_PROXY_ALLOWED_HOSTS }}
          NEXT_PUBLIC_EMAIL: ${{ vars.NEXT_PUBLIC_EMAIL }}
        run: npm run build

      - name: Run Lighthouse CI
        working-directory: apps/public_www
        env:
          LIGHTHOUSE_PAGE_PATHS: ${{ inputs.page_paths }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const baseConfigPath = path.resolve('.lighthouserc.json');
          const runtimeConfigPath = path.resolve('.lighthouserc.runtime.json');
          const rawInput = (process.env.LIGHTHOUSE_PAGE_PATHS ?? '').trim();
          const defaultTargets = ['/en/', '/zh-CN/', '/zh-HK/'];
          const requestedTargets = (rawInput ? rawInput.split(/[\n,]+/) : defaultTargets)
            .map((value) => value.trim())
            .filter(Boolean);

          const normalizedUrls = requestedTargets.map((target) => {
            if (/^https?:\/\//i.test(target)) {
              return target;
            }

            const normalizedPath = target.startsWith('/') ? target : `/${target}`;
            return `http://localhost:9000${normalizedPath}`;
          });

          const config = JSON.parse(fs.readFileSync(baseConfigPath, 'utf8'));
          config.ci = config.ci ?? {};
          config.ci.collect = config.ci.collect ?? {};
          config.ci.collect.url = normalizedUrls;

          fs.writeFileSync(runtimeConfigPath, `${JSON.stringify(config, null, 2)}\n`);
          console.log('Lighthouse targets:');
          for (const url of normalizedUrls) {
            console.log(`- ${url}`);
          }
          NODE

          npx lhci autorun --config=.lighthouserc.runtime.json

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-public-www-results
          path: apps/public_www/.lighthouseci/**
          if-no-files-found: warn
          include-hidden-files: true
