name: Test

on:
  repository_dispatch:
    types: [test]
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "backend/**"
      - "shared/**"
      - "tests/**"
      - "docs/api/**"
      - "docs/architecture/**"
      - ".github/workflows/test.yml"
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "backend/**"
      - "shared/**"
      - "tests/**"
      - "docs/api/**"
      - "docs/architecture/**"
      - ".github/workflows/test.yml"

jobs:
  test-public-www:
    name: Verify Public Website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve public site origin from infrastructure params
        id: resolve_public_site_origin
        run: |
          SITE_DOMAIN="$(python3 -c "import json; from pathlib import Path; params=json.loads(Path('backend/infrastructure/params/production.json').read_text(encoding='utf-8')); print(str(params.get('PublicWwwDomainName', '')).strip())")"
          if [ -z "$SITE_DOMAIN" ]; then
            echo "PublicWwwDomainName is required in backend/infrastructure/params/production.json"
            exit 1
          fi
          echo "site_origin=https://${SITE_DOMAIN}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: apps/public_www/package-lock.json

      - name: Restore Next.js build cache (public_www)
        uses: actions/cache@v5
        with:
          path: apps/public_www/.next/cache
          key: ${{ runner.os }}-nextjs-public-www-${{ hashFiles('apps/public_www/package-lock.json') }}-${{ hashFiles('apps/public_www/src/**/*.{js,jsx,ts,tsx}', 'apps/public_www/scripts/**/*.mjs', 'apps/public_www/next.config.*') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-public-www-${{ hashFiles('apps/public_www/package-lock.json') }}-

      - name: Validate Public Website
        working-directory: apps/public_www
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_SITE_ORIGIN: ${{ steps.resolve_public_site_origin.outputs.site_origin }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          NEXT_PUBLIC_FPS_MERCHANT_NAME: ${{ vars.NEXT_PUBLIC_FPS_MERCHANT_NAME }}
          NEXT_PUBLIC_FPS_MOBILE_NUMBER: ${{ vars.NEXT_PUBLIC_FPS_MOBILE_NUMBER }}
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_WWW_PROXY_ALLOWED_HOSTS: ${{ vars.NEXT_PUBLIC_WWW_PROXY_ALLOWED_HOSTS }}
          NEXT_PUBLIC_EMAIL: ${{ vars.NEXT_PUBLIC_EMAIL }}
          NEXT_PUBLIC_WHATSAPP_URL: ${{ vars.NEXT_PUBLIC_WHATSAPP_URL }}
          NEXT_PUBLIC_INSTAGRAM_URL: ${{ vars.NEXT_PUBLIC_INSTAGRAM_URL }}
          NEXT_PUBLIC_LINKEDIN_URL: ${{ vars.NEXT_PUBLIC_LINKEDIN_URL }}
          NEXT_PUBLIC_BUSINESS_ADDRESS: ${{ vars.NEXT_PUBLIC_BUSINESS_ADDRESS }}
          NEXT_PUBLIC_BUSINESS_PHONE_NUMBER: ${{ vars.NEXT_PUBLIC_BUSINESS_PHONE_NUMBER }}
        run: |
          npm ci
          npm run validate:content
          npm run lint
          npm run test:coverage
          npm run audit:assets
          npm run build

  test-training:
    name: Verify Training Website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Resolve training site env from infrastructure params
        id: resolve_training_site_env
        run: |
          SITE_DOMAIN="$(python3 -c "import json; from pathlib import Path; params=json.loads(Path('backend/infrastructure/params/production.json').read_text(encoding='utf-8')); print(str(params.get('TrainingDomainName', '')).strip())")"
          PUBLIC_WWW_DOMAIN="$(python3 -c "import json; from pathlib import Path; params=json.loads(Path('backend/infrastructure/params/production.json').read_text(encoding='utf-8')); print(str(params.get('PublicWwwDomainName', '')).strip())")"
          if [ -z "$SITE_DOMAIN" ]; then
            echo "TrainingDomainName is required in backend/infrastructure/params/production.json"
            exit 1
          fi
          if [ -z "$PUBLIC_WWW_DOMAIN" ]; then
            echo "PublicWwwDomainName is required in backend/infrastructure/params/production.json"
            exit 1
          fi
          echo "site_origin=https://${SITE_DOMAIN}" >> "$GITHUB_OUTPUT"
          echo "public_www_origin=https://${PUBLIC_WWW_DOMAIN}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: apps/training/package-lock.json

      - name: Validate Training Website
        working-directory: apps/training
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_SITE_ORIGIN: ${{ steps.resolve_training_site_env.outputs.site_origin }}
          NEXT_PUBLIC_PUBLIC_WWW_ORIGIN: ${{ steps.resolve_training_site_env.outputs.public_www_origin }}
          NEXT_PUBLIC_API_BASE_URL: /www
          NEXT_PUBLIC_TRAINING_API_KEY: test-training-poll-api-key
        run: |
          npm ci
          npm run lint
          npm run test:coverage
          npm run build

  test-flutter:
    name: Test Flutter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Run Flutter tests
        run: |
          set -e
          shopt -s globstar nullglob
          for dir in apps/evolvesprouts_app packages/flutter_ui packages/api_client_dart; do
            if [ -f "$dir/pubspec.yaml" ]; then
              test_files=($dir/test/**/*_test.dart)
              if [ "${#test_files[@]}" -eq 0 ]; then
                echo "ERROR: $dir has a pubspec.yaml but no test/**/*_test.dart files"
                exit 1
              fi
              echo "Testing Flutter in $dir"
              (cd "$dir" && flutter pub get && flutter test)
            else
              echo "Skipping missing $dir"
            fi
          done

  test-node:
    name: Test Node
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Run Node tests
        run: |
          set -e
          for dir in apps/admin_web; do
            if [ -f "$dir/package.json" ]; then
              echo "Testing Node in $dir"
              if [ -f "$dir/package-lock.json" ]; then
                (cd "$dir" && npm ci)
              else
                (cd "$dir" && npm install)
              fi
              (cd "$dir" && npm run test:coverage --if-present)
            else
              echo "Skipping missing $dir"
            fi
          done

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: evolvesprouts_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d evolvesprouts_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/evolvesprouts_test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "backend/pyproject.toml" ]; then
            python -m pip install -e "backend[test]"
          elif [ -f "backend/requirements.txt" ]; then
            python -m pip install -r backend/requirements.txt
            python -m pip install pytest
          else
            echo "Missing backend dependency manifest"
            exit 1
          fi

      - name: Apply Alembic migrations to test database
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
        run: |
          python -m alembic -c backend/db/alembic.ini upgrade head

      - name: Run Python tests
        run: |
          shopt -s globstar nullglob
          tests=(
            tests/test_*.py
            tests/**/test_*.py
            tests/**/*_test.py
            backend/**/test_*.py
            backend/**/tests/test_*.py
            backend/**/tests/**/*_test.py
          )
          if [ "${#tests[@]}" -eq 0 ]; then
            echo "No Python tests found"
            exit 0
          fi
          python -m pytest tests backend \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=1

      - name: Upload Python coverage report
        uses: actions/upload-artifact@v7
        if: always()
        continue-on-error: true
        with:
          name: python-coverage
          path: coverage.xml
          retention-days: 14

  test-infrastructure:
    name: Test Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Install infrastructure dependencies
        run: |
          if [ -f "backend/infrastructure/package.json" ]; then
            cd backend/infrastructure
            npm ci
          else
            echo "Missing backend/infrastructure/package.json"
          fi

      - name: Build Lambda bundle for CDK synth
        run: |
          python -m pip install --upgrade pip
          python backend/scripts/build_lambda_bundle.py

      - name: Run infrastructure tests
        run: |
          if [ -f "backend/infrastructure/package.json" ]; then
            cd backend/infrastructure
            npm run test:infra
          else
            echo "Missing backend/infrastructure/package.json"
          fi
