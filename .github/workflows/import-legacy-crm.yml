# Manual import from a legacy MariaDB SQL dump (entity-specific parsers).
#
# Flow: download the .sql → enforce ≤ 2 MB → upload to the import S3 bucket under
# `dumps/<entity>/<run_id>/<entity>.sql` → invoke EvolvesproutsImportLegacyVenuesFunction
# with `{ entity, s3_bucket, s3_key, dry_run }`. The Lambda dispatches to the registered
# importer for that entity.
#
# **Production only** — fails unless the GitHub Environment name is `production`.
#
# GitHub Environment (production):
# - vars: `AWS_ACCOUNT_ID`, `AWS_REGION` (required).
# - optional vars: `IMPORT_DUMP_BUCKET_NAME`, `IMPORT_LAMBDA_FUNCTION_NAME`
#   (if omitted, workflow resolves from stack outputs `ImportDumpBucketName` and
#   `ImportLegacyFunctionName`/`ImportLegacyVenuesFunctionName` on stack `evolvesprouts`).
# - secrets (optional): `IMPORT_LEGACY_CRM_SQL_URL` when `sql_download_url` is empty.
# - Obsolete for this workflow: runner-side `DATABASE_*` secrets — not used.
#
# IAM: `GitHubActionsRole` needs `s3:PutObject`, `s3:DeleteObject` on `dumps/*`, and
# `lambda:GetFunction` + `lambda:InvokeFunction` on the import Lambda.
#
# Security: do not echo presigned URLs. Step summary shows counts; when the Lambda sets
# `preview_allowed: false` (PII entities), preview lines are omitted from the summary.
# CloudWatch logs are not echoed into the summary to avoid accidental data leakage.

name: Import legacy CRM

on:
  workflow_dispatch:
    inputs:
      entity:
        description: Legacy CRM entity to import
        required: true
        type: choice
        options:
          - venues
      sql_download_url:
        description: >
          HTTPS URL to the MariaDB .sql backup (optional if secret IMPORT_LEGACY_CRM_SQL_URL is set).
        required: false
        type: string
      dry_run:
        description: If true, parse and resolve areas but do not insert into the database.
        required: false
        default: true
        type: boolean
      environment:
        description: GitHub Environment (must be `production` for this workflow).
        required: true
        type: environment

concurrency:
  group: import-legacy-crm-${{ github.event.inputs.environment }}-${{ github.event.inputs.entity }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  import:
    name: Upload dump and run import Lambda
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Validate environment (production only)
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          set -euo pipefail
          if [ "$ENVIRONMENT" != "production" ]; then
            echo "This workflow is restricted to the production environment." >&2
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        if: ${{ vars.AWS_ACCOUNT_ID != '' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: import-legacy-crm-${{ github.run_id }}

      - name: Resolve import resources (vars or stack outputs)
        env:
          IMPORT_DUMP_BUCKET_NAME: ${{ vars.IMPORT_DUMP_BUCKET_NAME }}
          IMPORT_LAMBDA_FUNCTION_NAME: ${{ vars.IMPORT_LAMBDA_FUNCTION_NAME }}
          IMPORT_STACK_NAME: ${{ vars.IMPORT_STACK_NAME }}
        run: |
          set -euo pipefail
          STACK_NAME="${IMPORT_STACK_NAME:-evolvesprouts}"
          RESOLVED_BUCKET="${IMPORT_DUMP_BUCKET_NAME:-}"
          RESOLVED_FUNC="${IMPORT_LAMBDA_FUNCTION_NAME:-}"

          if [ -z "${RESOLVED_BUCKET:-}" ] || [ -z "${RESOLVED_FUNC:-}" ]; then
            STACK_EXISTS=$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --query 'Stacks[0].StackName' \
              --output text 2>/dev/null || true)
            if [ -z "${STACK_EXISTS:-}" ] || [ "${STACK_EXISTS}" = "None" ]; then
              echo "Stack ${STACK_NAME} not found and required import vars are missing." >&2
              echo "Set IMPORT_STACK_NAME or provide IMPORT_DUMP_BUCKET_NAME + IMPORT_LAMBDA_FUNCTION_NAME." >&2
              exit 1
            fi
          fi

          if [ -z "${RESOLVED_BUCKET:-}" ]; then
            RESOLVED_BUCKET=$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --query "Stacks[0].Outputs[?OutputKey=='ImportDumpBucketName'].OutputValue | [0]" \
              --output text)
          fi
          if [ -z "${RESOLVED_FUNC:-}" ]; then
            RESOLVED_FUNC=$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --query "Stacks[0].Outputs[?OutputKey=='ImportLegacyFunctionName'].OutputValue | [0]" \
              --output text)
          fi
          if [ -z "${RESOLVED_FUNC:-}" ] || [ "${RESOLVED_FUNC}" = "None" ]; then
            RESOLVED_FUNC=$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --query "Stacks[0].Outputs[?OutputKey=='ImportLegacyVenuesFunctionName'].OutputValue | [0]" \
              --output text)
          fi

          if [ -z "${RESOLVED_BUCKET:-}" ] || [ "${RESOLVED_BUCKET}" = "None" ]; then
            echo "Could not resolve ImportDumpBucketName from stack ${STACK_NAME}." >&2
            exit 1
          fi
          if [ -z "${RESOLVED_FUNC:-}" ] || [ "${RESOLVED_FUNC}" = "None" ]; then
            echo "Could not resolve ImportLegacyFunctionName/ImportLegacyVenuesFunctionName from stack ${STACK_NAME}." >&2
            exit 1
          fi

          echo "IMPORT_DUMP_BUCKET=${RESOLVED_BUCKET}" >> "${GITHUB_ENV}"
          echo "IMPORT_LAMBDA_FUNCTION=${RESOLVED_FUNC}" >> "${GITHUB_ENV}"

      - name: Verify Lambda and IAM (preflight)
        env:
          FUNC: ${{ env.IMPORT_LAMBDA_FUNCTION }}
          BUCKET: ${{ env.IMPORT_DUMP_BUCKET }}
        run: |
          set -euo pipefail
          if [ -z "${FUNC:-}" ]; then
            echo "Set IMPORT_LAMBDA_FUNCTION_NAME or stack output ImportLegacyFunctionName." >&2
            exit 1
          fi
          if [ -z "${BUCKET:-}" ]; then
            echo "Set IMPORT_DUMP_BUCKET_NAME or stack output ImportDumpBucketName." >&2
            exit 1
          fi
          echo "Checking Lambda exists: $FUNC"
          if ! aws lambda get-function --function-name "$FUNC" --query 'Configuration.FunctionArn' --output text; then
            echo "lambda:GetFunction failed. Fix IMPORT_LAMBDA_FUNCTION_NAME or IAM." >&2
            exit 1
          fi
          echo "Checking S3 bucket exists/access: $BUCKET"
          if ! aws s3api head-bucket --bucket "$BUCKET"; then
            echo "s3:HeadBucket failed. Fix IMPORT_DUMP_BUCKET_NAME or IAM." >&2
            exit 1
          fi

      - name: Download SQL dump
        env:
          ENTITY: ${{ github.event.inputs.entity }}
          INPUT_URL: ${{ github.event.inputs.sql_download_url }}
          SECRET_URL: ${{ secrets.IMPORT_LEGACY_CRM_SQL_URL }}
        run: |
          set -euo pipefail
          URL="${INPUT_URL:-}"
          if [ -z "${URL// }" ]; then
            URL="${SECRET_URL:-}"
          fi
          if [ -z "${URL// }" ]; then
            echo "Provide sql_download_url or set IMPORT_LEGACY_CRM_SQL_URL." >&2
            exit 1
          fi
          curl -fsSL "$URL" -o "${RUNNER_TEMP}/${ENTITY}.sql"
          SIZE=$(wc -c < "${RUNNER_TEMP}/${ENTITY}.sql")
          echo "Downloaded SQL dump ($SIZE bytes)"
          if [ "$SIZE" -gt 2097152 ]; then
            echo "Dump exceeds 2 MB." >&2
            exit 1
          fi

      - name: Upload dump to S3
        env:
          ENTITY: ${{ github.event.inputs.entity }}
          IMPORT_DUMP_BUCKET: ${{ env.IMPORT_DUMP_BUCKET }}
        run: |
          set -euo pipefail
          if [ -z "${IMPORT_DUMP_BUCKET:-}" ]; then
            echo "Set IMPORT_DUMP_BUCKET_NAME." >&2
            exit 1
          fi
          KEY="dumps/${ENTITY}/${GITHUB_RUN_ID}/${ENTITY}.sql"
          aws s3 cp "${RUNNER_TEMP}/${ENTITY}.sql" \
            "s3://${IMPORT_DUMP_BUCKET}/${KEY}" \
            --sse AES256
          echo "IMPORT_S3_KEY=${KEY}" >> "${GITHUB_ENV}"

      - name: Invoke import Lambda
        env:
          ENTITY: ${{ github.event.inputs.entity }}
          BUCKET: ${{ env.IMPORT_DUMP_BUCKET }}
          KEY: ${{ env.IMPORT_S3_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          FUNC: ${{ env.IMPORT_LAMBDA_FUNCTION }}
        run: |
          set -euo pipefail
          if [ -z "${FUNC:-}" ]; then
            echo "Set IMPORT_LAMBDA_FUNCTION_NAME." >&2
            exit 1
          fi
          if [ "${DRY_RUN}" = "true" ]; then
            DRY_JSON=true
          else
            DRY_JSON=false
          fi
          PAYLOAD=$(jq -cn \
            --arg e "$ENTITY" --arg b "$BUCKET" --arg k "$KEY" --argjson d "$DRY_JSON" \
            '{entity:$e, s3_bucket:$b, s3_key:$k, dry_run:$d}')
          META=$(aws lambda invoke \
            --function-name "$FUNC" \
            --cli-binary-format raw-in-base64-out \
            --payload "$PAYLOAD" \
            --log-type Tail \
            --output json \
            lambda-response-payload.json)
          echo "$META" | jq .
          echo "## Lambda import result" >> "${GITHUB_STEP_SUMMARY}"
          {
            echo '```json'
            jq 'if .preview_allowed == false then del(.preview) else . end' lambda-response-payload.json || cat lambda-response-payload.json
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}" || true
          if echo "$META" | jq -e '.FunctionError != null' >/dev/null 2>&1; then
            echo "Lambda reported FunctionError" >&2
            echo "$META" >&2
            cat lambda-response-payload.json >&2
            exit 1
          fi
          if jq -e 'has("errorMessage")' lambda-response-payload.json >/dev/null 2>&1; then
            echo "Lambda payload contains errorMessage" >&2
            cat lambda-response-payload.json >&2
            exit 1
          fi

      - name: Remove uploaded dump from S3
        if: always()
        env:
          IMPORT_DUMP_BUCKET: ${{ env.IMPORT_DUMP_BUCKET }}
          KEY: ${{ env.IMPORT_S3_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${IMPORT_DUMP_BUCKET:-}" ] || [ -z "${KEY:-}" ]; then
            exit 0
          fi
          aws s3 rm "s3://${IMPORT_DUMP_BUCKET}/${KEY}" || true
