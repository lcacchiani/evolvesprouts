name: Lint

on:
  repository_dispatch:
    types: [lint]
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "backend/**"
      - "shared/**"
      - "tests/**"
      - "docs/api/**"
      - "docs/architecture/**"
      - ".cursorrules"
      - "AGENTS.md"
      - ".cursor/rules/**"
      - "scripts/validate-cursorrules.sh"
      - ".pre-commit-config.yaml"
      - ".github/workflows/lint.yml"
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "backend/**"
      - "shared/**"
      - "tests/**"
      - "docs/api/**"
      - "docs/architecture/**"
      - ".cursorrules"
      - "AGENTS.md"
      - ".cursor/rules/**"
      - "scripts/validate-cursorrules.sh"
      - ".pre-commit-config.yaml"
      - ".github/workflows/lint.yml"

jobs:
  enforce-cursorrules:
    name: Enforce Cursor Rules Contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Validate .cursorrules contract
        run: bash scripts/validate-cursorrules.sh

  lint-dart:
    name: Lint Dart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Run Dart/Flutter lint
        run: |
          set -e
          for dir in apps/evolvesprouts_app packages/flutter_ui packages/api_client_dart; do
            if [ -d "$dir" ]; then
              echo "Linting Dart in $dir"
              (cd "$dir" && flutter pub get && flutter analyze)
            else
              echo "Skipping missing $dir"
            fi
          done

  lint-react:
    name: Lint React
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.21.1"

      - name: Run React lint
        run: |
          set -e
          for dir in apps/admin_web apps/public_www apps/training; do
            if [ -f "$dir/package.json" ]; then
              echo "Linting React in $dir"
              if [ -f "$dir/package-lock.json" ]; then
                (cd "$dir" && npm ci)
              else
                (cd "$dir" && npm install)
              fi
              (cd "$dir" && npm run lint --if-present)
              if [ "$dir" = "apps/admin_web" ] || [ "$dir" = "apps/training" ]; then
                (cd "$dir" && npm audit --omit=dev --audit-level=high)
              fi
            else
              echo "Skipping missing $dir"
            fi
          done

  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # Avoid depending on pull_request merge refs which can intermittently fail to fetch.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.21.1"
          cache: npm
          cache-dependency-path: backend/infrastructure/package-lock.json

      - name: Install CDK dependencies for pre-commit
        working-directory: backend/infrastructure
        run: npm ci

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pre-commit

      - name: Run pre-commit checks
        run: |
          pre-commit run --all-files --show-diff-on-failure

  lint-cdk:
    name: Lint CDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.21.1"
          cache: npm
          cache-dependency-path: backend/infrastructure/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install CDK dependencies
        working-directory: backend/infrastructure
        run: npm ci

      - name: Acknowledge CDK CLI notice
        working-directory: backend/infrastructure
        run: npx cdk acknowledge 34892 || true

      - name: Run CDK lint
        working-directory: backend/infrastructure
        run: npm run lint --if-present

      - name: Synthesize CDK
        working-directory: backend/infrastructure
        env:
          CDK_DISABLE_CONTEXT_LOOKUPS: "1"
        run: npx cdk synth --quiet --output cdk.out

      - name: Check CDK routes match admin OpenAPI spec
        run: node scripts/check-cdk-admin-api-routes.mjs

  lint-openapi:
    name: Lint OpenAPI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Lint OpenAPI specs
        run: npx --yes @redocly/cli@1.34.11 lint docs/api/admin.yaml docs/api/public.yaml
