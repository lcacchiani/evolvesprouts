name: Deploy Training Web

on:
  repository_dispatch:
    types: [deploy-training]
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/training/**"
      - "scripts/deploy/deploy-training.sh"

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-training
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Resolve training site env from infrastructure params
        id: resolve_training_site_env
        run: |
          SITE_DOMAIN="$(python3 -c "import json; from pathlib import Path; params=json.loads(Path('backend/infrastructure/params/production.json').read_text(encoding='utf-8')); print(str(params.get('TrainingDomainName', '')).strip())")"
          PUBLIC_WWW_DOMAIN="$(python3 -c "import json; from pathlib import Path; params=json.loads(Path('backend/infrastructure/params/production.json').read_text(encoding='utf-8')); print(str(params.get('PublicWwwDomainName', '')).strip())")"
          if [ -z "$SITE_DOMAIN" ]; then
            echo "TrainingDomainName is required in backend/infrastructure/params/production.json"
            exit 1
          fi
          if [ -z "$PUBLIC_WWW_DOMAIN" ]; then
            echo "PublicWwwDomainName is required in backend/infrastructure/params/production.json"
            exit 1
          fi
          echo "site_origin=https://${SITE_DOMAIN}" >> "$GITHUB_OUTPUT"
          echo "public_www_origin=https://${PUBLIC_WWW_DOMAIN}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: apps/training/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/training

      - name: Restore Next.js build cache
        uses: actions/cache@v6
        with:
          path: apps/training/.next/cache
          key: ${{ runner.os }}-nextjs-training-${{ hashFiles('apps/training/package-lock.json') }}
          restore-keys: ${{ runner.os }}-nextjs-training-

      - name: Build training web
        run: npm run build
        working-directory: apps/training
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_SITE_ORIGIN: ${{ steps.resolve_training_site_env.outputs.site_origin }}
          NEXT_PUBLIC_PUBLIC_WWW_ORIGIN: ${{ steps.resolve_training_site_env.outputs.public_www_origin }}
          # Polls call same-origin /www/* via Training CloudFront (not execute-api /prod).
          NEXT_PUBLIC_API_BASE_URL: /www
          NEXT_PUBLIC_TRAINING_API_KEY: ${{ secrets.NEXT_PUBLIC_WWW_CRM_API_KEY }}

      - name: Configure AWS credentials
        if: ${{ vars.AWS_ACCOUNT_ID != '' && vars.AWS_REGION != '' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Deploy training web
        if: ${{ vars.AWS_ACCOUNT_ID != '' && vars.AWS_REGION != '' }}
        run: |
          if [ -f "scripts/deploy/deploy-training.sh" ]; then
            bash "scripts/deploy/deploy-training.sh"
          else
            echo "Deploy script not found: scripts/deploy/deploy-training.sh"
            exit 1
          fi
        env:
          TRAINING_STACK_NAME: evolvesprouts-training
