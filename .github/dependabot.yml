# Dependabot configuration for automated dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2

updates:
  # GitHub Actions - keep CI secure and up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"
    groups:
      github-actions:
        patterns:
          - "*"

  # NPM - CDK infrastructure
  - package-ecosystem: "npm"
    directory: "/backend/infrastructure"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "infrastructure"
    groups:
      aws-cdk:
        patterns:
          - "aws-cdk*"
          - "@aws-cdk/*"
          - "constructs"
      minor-and-patch:
        patterns:
          - "*"
        exclude-patterns:
          - "aws-cdk*"
          - "@aws-cdk/*"
          - "constructs"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Ignore major version updates - review manually
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # aws-cdk-lib currently pins yaml@1.10.2 transitively; the 1.x patched
      # version (>=1.10.3) is not resolvable in Dependabot security jobs yet.
      - dependency-name: "yaml"

  # Python - Lambda backend
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "backend"
    groups:
      aws:
        patterns:
          - "boto3"
          - "botocore"
          - "aws*"
      database:
        patterns:
          - "sqlalchemy*"
          - "alembic"
          - "psycopg*"
      minor-and-patch:
        patterns:
          - "*"
        exclude-patterns:
          - "boto3"
          - "botocore"
          - "aws*"
          - "sqlalchemy*"
          - "alembic"
          - "psycopg*"
        update-types:
          - "minor"
          - "patch"

  # Pub - Flutter mobile app
  - package-ecosystem: "pub"
    directory: "/apps/evolvesprouts_app"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "mobile"
    groups:
      flutter:
        patterns:
          - "flutter*"
          - "cupertino*"
      firebase:
        patterns:
          - "firebase*"
          - "cloud_firestore"
      amplify:
        patterns:
          - "amplify*"
      minor-and-patch:
        patterns:
          - "*"
        exclude-patterns:
          - "flutter*"
          - "firebase*"
          - "amplify*"
        update-types:
          - "minor"
          - "patch"

  # NPM - Admin web app
  - package-ecosystem: "npm"
    directory: "/apps/admin_web"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "web"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # ESLint 10 major bump blocked until eslint-config-next ships native
      # ESLint 10 support (tracked in Issue #402 / F-14). Remove these
      # ignores once the upstream blocker clears.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-config-next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/compat"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript-eslint"
        update-types: ["version-update:semver-major"]

  # NPM - Public website app
  - package-ecosystem: "npm"
    directory: "/apps/public_www"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "web"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # ESLint 10 major bump blocked until eslint-config-next ships native
      # ESLint 10 support (tracked in Issue #402 / F-14). Remove these
      # ignores once the upstream blocker clears.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-config-next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/compat"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript-eslint"
        update-types: ["version-update:semver-major"]
