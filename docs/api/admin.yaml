components:
  securitySchemes:
    SigV4Auth:
      type: apiKey
      in: header
      name: Authorization
      description: |
        AWS Signature Version 4 signed Authorization header (IAM auth).
    AdminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Cognito JWT validated by AdminGroupAuthorizerFunction.
    UserBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Cognito JWT validated by UserAuthorizerFunction.

  parameters:
    AssetId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Asset identifier.
    GrantId:
      name: grantId
      in: path
      required: true
      schema:
        type: string
      description: Asset grant identifier.
    LocationId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Location identifier.
    LeadId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Sales lead identifier.
    ServiceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Service identifier.
    InstanceId:
      name: instanceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Service instance identifier.
    EnrollmentId:
      name: enrollmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Enrollment identifier.
    DiscountCodeId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Discount code identifier.
    AdminContactId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: CRM contact identifier.
    NoteId:
      name: noteId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: CRM note identifier.
    AdminFamilyId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: CRM family identifier.
    AdminFamilyMemberId:
      name: memberId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Family membership row identifier.
    AdminOrganizationId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: CRM organization identifier.
    AdminOrganizationMemberId:
      name: memberId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Organization membership row identifier.
    ExpenseId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Expense identifier.

  responses:
    BadRequest:
      description: Validation or request format error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authorization failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    AssetTagRef:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        color:
          type: string
          nullable: true
          description: Optional CSS color (e.g. hex).
    Asset:
      type: object
      required:
        - id
        - title
        - asset_type
        - s3_key
        - file_name
        - visibility
        - tags
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        asset_type:
          type: string
          enum: [guide, video, pdf, document]
        s3_key:
          type: string
        file_name:
          type: string
        content_type:
          type: string
          nullable: true
        content_language:
          type: string
          nullable: true
          description: >
            BCP 47-style tag for the language of the file content. Admin create/update accepts only
            en, zh-CN, or zh-HK (null clears). Public list filters accept any valid BCP 47-style tag.
        resource_key:
          type: string
          nullable: true
          description: Optional normalized key used to map public media submissions to this asset.
        visibility:
          type: string
          enum: [public, restricted]
        tags:
          type: array
          items:
            $ref: "#/components/schemas/AssetTagRef"
          description: Tags on this asset. Non-admin asset list responses use an empty array when tags are not loaded.
        created_by:
