        Returns active organisations ordered by name for admin UI dropdowns.
        When `relationship_type` is omitted, vendor and partner rows are both excluded
        (Contacts default). Pass `relationship_type=partner` for Services → Partners or
        `relationship_type=vendor` for Finance → Vendors. When `relationship_type` is set,
        only organisations with that relationship type are returned. At most 100 rows
        unless `limit` is set lower.
      security:
        - AdminBearerAuth: []
      parameters:
        - name: relationship_type
          in: query
          description: >
            When set, only organizations with this CRM relationship type are returned.
            When omitted, vendor and partner rows are both excluded (Contacts default).
          schema:
            $ref: "#/components/schemas/EntityRelationshipType"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Picker list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityPickerListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/admin/organizations:
    get:
      summary: List CRM organizations
      description: |
        Lists organizations for CRM and Finance. When `relationship_type` is omitted,
        vendor and partner rows are both excluded (Contacts default). Pass
        `relationship_type=partner` for Services → Partners or `relationship_type=vendor`
        for Finance → Vendors.
        List responses may omit related loads for performance when listing vendors only
        (`include_relationships=false` server-side); partner lists still include tags,
        members, and location summary. Use `GET /v1/admin/organizations/{id}` for full
        detail when needed.
      security:
        - AdminBearerAuth: []
      parameters:
        - name: query
          in: query
          schema:
            type: string
        - name: active
          in: query
          schema:
            type: boolean
        - name: relationship_type
          in: query
          description: >
            When set, only organizations with this CRM relationship type are returned
            (e.g. `vendor` for Finance). When omitted, vendor and partner rows are both
            excluded from the list (Contacts default).
          schema:
            $ref: "#/components/schemas/EntityRelationshipType"
        - name: sort
          in: query
          description: >
            Optional sort order. When `name`, results are ordered case-insensitively by
            trimmed `name` ascending, then by `id` ascending (stable pagination with the
            same `cursor` token as the default list). When omitted, rows are ordered by
            `created_at` descending (newest first), then `id` descending.
          schema:
            type: string
            enum:
              - name
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Organization list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOrganizationListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      summary: Create CRM organization
      security:
        - AdminBearerAuth: []
