    CreateInstanceRequest:
      type: object
      required: [slug]
      description: >
        Instance create body for `POST /v1/admin/services/{id}/instances`. `slug` is required
        for all service types (400 with `field: slug` when missing or invalid). Duplicate
        instance slugs return 409 with `field: slug`.
      properties:
        title:
          type: string
          nullable: true
        slug:
          type: string
          description: >
            Public instance slug (required). URL-safe: lowercase letters,
            digits, and single hyphens between segments (e.g. spring-workshop). Stored normalized
            to lowercase. Must be unique among instances.
        description:
          type: string
          nullable: true
        cover_image_s3_key:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/InstanceStatus"
        delivery_mode:
          $ref: "#/components/schemas/ServiceDeliveryMode"
        location_id:
          type: string
          format: uuid
          nullable: true
        max_capacity:
          type: integer
          nullable: true
        waitlist_enabled:
          type: boolean
        external_url:
          type: string
          format: uri
          pattern: ^https?://
          nullable: true
          maxLength: 500
        partner_organization_ids:
          type: array
          items:
            type: string
            format: uuid
          description: >
            Ordered partner organization ids for event instances. Unknown ids return 400.
        instructor_id:
          type: string
          nullable: true
        cohort:
          type: string
          nullable: true
          maxLength: 128
          pattern: ^[a-z0-9]+(-[a-z0-9]+)*$
        notes:
          type: string
          nullable: true
        tag_ids:
          type: array
          items:
            type: string
            format: uuid
          description: >
            Replaces all instance tag associations when present (including on PUT).
            The admin web UI sends this on every instance save; omit the field only if
            a non-UI client must patch other fields without changing tags.
        session_slots:
          type: array
          items:
            $ref: "#/components/schemas/SessionSlot"
        training_details:
          type: object
          nullable: true
          properties:
            training_format:
              $ref: "#/components/schemas/TrainingFormat"
            price:
              type: string
              description: >
                Required for training_course instances. Decimal amount as a string; zero is allowed (free offerings).
            currency:
              type: string
            pricing_unit:
              $ref: "#/components/schemas/TrainingPricingUnit"
        event_ticket_tiers:
          type: array
          items:
            $ref: "#/components/schemas/EventTicketTier"
        consultation_details:
          type: object
          nullable: true
          properties:
            pricing_model:
              $ref: "#/components/schemas/ConsultationPricingModel"
            price:
              type: string
              nullable: true
            currency:
              type: string
            package_sessions:
              type: integer
              nullable: true
    UpdateInstanceRequest:
      allOf:
        - $ref: "#/components/schemas/CreateInstanceRequest"
      required:
        - status
      description: >
        Clearing `slug` to null returns 400 with `field: slug`.
    Enrollment:
      type: object
      required: [id, instance_id, status]
      properties:
        id:
          type: string
          format: uuid
        instance_id:
          type: string
          format: uuid
        contact_id:
          type: string
          format: uuid
          nullable: true
        family_id:
          type: string
          format: uuid
          nullable: true
        organization_id:
          type: string
          format: uuid
          nullable: true
        ticket_tier_id:
          type: string
          format: uuid
          nullable: true
        discount_code_id:
          type: string
          format: uuid
          nullable: true
        status:
          $ref: "#/components/schemas/EnrollmentStatus"
        amount_paid:
          type: string
          nullable: true
        currency:
          type: string
          nullable: true
        enrolled_at:
          type: string
          format: date-time
          nullable: true
        cancelled_at:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
        party_display_name:
          type: string
          description: >
            Display label for the enrollment party. For contact enrollment this is
            `contact name · email` (middle dot) when both name and email are known; otherwise the best
            available single label. For family or organization enrollment this is
            `entity name · primary contact name` (middle dot) when both the entity and primary contact
            names are known; otherwise the best available single label. Matches the billing enrollment
            picker `partyDisplayName` convention.
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
    EnrollmentListResponse:
      type: object
      required: [items, total_count]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Enrollment"
        next_cursor:
          type: string
          nullable: true
        total_count:
          type: integer
    EnrollmentResponse:
      type: object
      required: [enrollment]
      properties:
        enrollment:
          $ref: "#/components/schemas/Enrollment"
    CreateEnrollmentRequest:
      type: object
      properties:
        contact_id:
          type: string
          format: uuid
          nullable: true
        family_id:
          type: string
          format: uuid
          nullable: true
        organization_id:
          type: string
          format: uuid
          nullable: true
        ticket_tier_id:
          type: string
          format: uuid
          nullable: true
        discount_code_id:
          type: string
          format: uuid
          nullable: true
          description: >
            Must be globally scoped, scoped to this instance's service, or scoped to this
            instance; otherwise the API returns 400.
        status:
          $ref: "#/components/schemas/EnrollmentStatus"
        amount_paid:
          type: string
          nullable: true
        currency:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
    UpdateEnrollmentRequest:
      type: object
      minProperties: 1
      properties:
        promote_to_family_id:
          type: string
          format: uuid
          description: >
            One-time conversion from a contact-only enrollment (contact_id set, family and
            organization null) to a family enrollment. Mutually exclusive with
            promote_to_organization_id. Clears contact_id, sets family_id, and aligns bill-to
            fields to the family.
        promote_to_organization_id:
          type: string
          format: uuid
          description: >
            One-time conversion from a contact-only enrollment to an organization enrollment.
            Mutually exclusive with promote_to_family_id. Clears contact_id, sets
            organization_id, and aligns bill-to fields to the organization.
        status:
          $ref: "#/components/schemas/EnrollmentStatus"
        enrolled_at:
          type: string
          format: date-time
          description: >
            ISO 8601 instant for when the enrollment was recorded. Omit to leave unchanged.
            Null or empty strings are rejected (the enrollment row requires a timestamp).
        amount_paid:
          type: string
          nullable: true
        currency:
          type: string
          nullable: true
        discount_code_id:
          type: string
          format: uuid
          nullable: true
          description: >
            Set to null to clear the enrollment discount; changing the id adjusts
            discount code usage counts accordingly. The new id must be globally scoped,
            scoped to this instance's service, or scoped to this instance; otherwise the
            API returns 400.
        notes:
          type: string
          nullable: true
    DiscountCode:
      type: object
      required: [id, code, discount_type, discount_value, active]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        description:
          type: string
          nullable: true
        discount_type:
          $ref: "#/components/schemas/DiscountType"
        discount_value:
          type: string
        currency:
          type: string
          nullable: true
        valid_from:
          type: string
          format: date-time
          nullable: true
        valid_until:
          type: string
          format: date-time
          nullable: true
        service_id:
          type: string
          format: uuid
          nullable: true
        instance_id:
          type: string
          format: uuid
          nullable: true
        max_uses:
          type: integer
          nullable: true
        current_uses:
          type: integer
        active:
          type: boolean
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
    DiscountCodeListResponse:
      type: object
      required: [items, total_count]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DiscountCode"
        next_cursor:
          type: string
          nullable: true
        total_count:
          type: integer
    DiscountCodeResponse:
      type: object
      required: [discount_code]
      properties:
        discount_code:
          $ref: "#/components/schemas/DiscountCode"
    CreateDiscountCodeRequest:
      type: object
      required: [code, discount_type, discount_value]
      properties:
        code:
          type: string
        description:
          type: string
          nullable: true
        discount_type:
          $ref: "#/components/schemas/DiscountType"
        discount_value:
          type: string
          description: >
            For `referral` type the server coerces this to "0"; client-supplied
            values are ignored (including malformed strings).
        currency:
          type: string
          nullable: true
          description: >
