        - name: query
          in: query
          schema:
            type: string
          description: |
            Search first name, last name, email, Instagram, and phone (stored as ISO region +
            national digits; server normalises ``+`` / digit queries before matching).
        - name: active
          in: query
          schema:
            type: boolean
        - name: contact_type
          in: query
          schema:
