        relationship_type:
          $ref: "#/components/schemas/EntityOrganizationRelationshipType"
        partner_key:
          type: string
          maxLength: 128
          nullable: true
          description: >
            Optional partner-only key. Omit or null to clear. Must be null when
            relationship_type is not partner.
        website:
          type: string
          maxLength: 500
          nullable: true
        location_id:
          type: string
          format: uuid
          nullable: true
        tag_ids:
          type: array
          items:
            type: string
            format: uuid
        active:
          type: boolean
          description: >
            When false, the organization is created archived (`archived_at` set).
            Omit for default active (not archived).
    UpdateAdminOrganizationRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        organization_type:
          $ref: "#/components/schemas/EntityOrganizationType"
        relationship_type:
          $ref: "#/components/schemas/EntityOrganizationRelationshipType"
        partner_key:
          type: string
          maxLength: 128
          nullable: true
          description: >
            Optional partner-only key. Omit or null to clear. Must be null when
            relationship_type is not partner.
        website:
          type: string
          maxLength: 500
          nullable: true
        location_id:
          type: string
          format: uuid
          nullable: true
        active:
          type: boolean
        tag_ids:
          type: array
          items:
            type: string
            format: uuid
    AddOrganizationMemberRequest:
      type: object
      required:
        - contact_id
      properties:
        contact_id:
          type: string
          format: uuid
        role:
          type: string
          deprecated: true
          description: |
            Ignored. Membership role is derived from the contact's `contact_type` (parent, helper,
            and professional map to `staff`; child maps to `member`; other maps to `other`).
        is_primary_contact:
          type: boolean
    ActionMessageResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
        detail:
          type: string
          nullable: true
        field:
          type: string
          nullable: true
          description: >
            Optional input field key for validation-style errors. Duplicate service
            service_key+tier conflicts use the literal `service_key_tier` (not `service_key` or `service_tier`).
    HealthResponse:
      type: object
      required:
        - healthy
        - version
        - environment
      properties:
        healthy:
          type: boolean
        version:
          type: string
        environment:
          type: string
        checks:
          type: array
          items:
            type: object
            additionalProperties: true
