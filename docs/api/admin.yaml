    CreateServiceCoverImageUploadRequest:
      type: object
      required: [file_name]
      properties:
        file_name:
          type: string
        content_type:
          type: string
          nullable: true
    ServiceCoverImageUploadResponse:
      type: object
      required: [upload_url, upload_method, s3_key, expires_at]
      properties:
        upload_url:
          type: string
          format: uri
        upload_method:
          type: string
        upload_headers:
          type: object
          additionalProperties:
            type: string
        s3_key:
          type: string
        expires_at:
          type: string
          format: date-time
        service:
          type: object
          properties:
            id:
              type: string
              format: uuid
            cover_image_s3_key:
              type: string
    SessionSlot:
      type: object
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        instance_id:
          type: string
          format: uuid
          nullable: true
        purpose_service_id:
          type: string
          format: uuid
          nullable: true
          description: >
            When set, identifies the catalog `services.id` used for cross-booking slot uniqueness
            (consultation tiers and intro-call). Null for event/training slots.
        location_id:
          type: string
          format: uuid
          nullable: true
        starts_at:
          type: string
          format: date-time
          nullable: true
          description: >
            Instant in UTC or with a numeric timezone offset (RFC 3339). On create/update
            requests, each value must be timezone-aware (Z suffix or ±HH:MM offset); naive
            date-time strings are rejected.
        ends_at:
          type: string
          format: date-time
          nullable: true
          description: >
            Same rules as starts_at. On create/update requests, must be timezone-aware
            and strictly after starts_at.
        sort_order:
          type: integer
          nullable: true
    EventTicketTier:
      type: object
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        instance_id:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        price:
          type: string
          nullable: true
          pattern: ^-?\d+(\.\d{1,2})?$
        currency:
          type: string
          nullable: true
          minLength: 3
          maxLength: 3
          pattern: ^[A-Z]{3}$
        max_quantity:
          type: integer
          nullable: true
        sort_order:
          type: integer
          nullable: true
    InstancePartnerOrganization:
      type: object
      required: [id, name, archived]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        archived:
          type: boolean
          description: True when the organization is archived (omitted from active pickers).
        location_id:
          type: string
          format: uuid
          nullable: true
          description: Partner organization venue id when set (FK locations).
    ServiceInstance:
      type: object
      required: [id, service_id, status, slug, resolved_slug]
      properties:
        id:
          type: string
          format: uuid
        service_id:
          type: string
          format: uuid
        title:
          type: string
          nullable: true
        slug:
          type: string
          description: >
            Public instance slug (required for all service types). URL-safe: lowercase letters,
            digits, and single hyphens between segments (e.g. spring-workshop). Stored normalized
            to lowercase. Globally unique across `service_instances`.
        description:
          type: string
          nullable: true
        cover_image_s3_key:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/InstanceStatus"
        delivery_mode:
          $ref: "#/components/schemas/ServiceDeliveryMode"
        location_id:
          type: string
          format: uuid
          nullable: true
        max_capacity:
          type: integer
          nullable: true
        capacity_enrolled_count:
          type: integer
          description: >
            Count of enrollments that consume instance capacity (registered, confirmed,
            completed). Included on admin instance payloads for display and capacity logic.
        waitlist_enabled:
          type: boolean
        external_url:
          type: string
          format: uri
          pattern: ^https?://
          nullable: true
          maxLength: 500
          description: >
            Optional external registration or info URL (http/https only).
            Distinct from Eventbrite sync URLs on the instance.
        partner_organizations:
          type: array
          items:
            $ref: "#/components/schemas/InstancePartnerOrganization"
        instructor_id:
          type: string
          nullable: true
        cohort:
          type: string
          nullable: true
          maxLength: 128
          pattern: ^[a-z0-9]+(-[a-z0-9]+)*$
          description: >
            Optional label using the same normalization rules as instance referral slugs
            (lowercase letters, digits, single hyphens between segments).
        notes:
          type: string
          nullable: true
        tags:
          type: array
          items:
            $ref: "#/components/schemas/EntityTagRef"
        tag_ids:
          type: array
          items:
            type: string
            format: uuid
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        resolved_title:
          type: string
          nullable: true
        resolved_description:
          type: string
          nullable: true
        resolved_cover_image_s3_key:
          type: string
          nullable: true
        resolved_delivery_mode:
          type: string
          nullable: true
        resolved_slug:
          type: string
          description: >
            Public instance slug; same as `slug`. Kept for backwards compatibility.
        resolved_location_id:
          type: string
          format: uuid
          nullable: true
          description: >
            Effective venue: instance location_id when set, otherwise the parent
            service default location_id.
        resolved_training_details:
          type: object
          nullable: true
          description: >
            Effective training pricing: instance row when present, otherwise the
            parent service training_course_details defaults.
          properties:
            training_format:
              $ref: "#/components/schemas/TrainingFormat"
            price:
              type: string
            currency:
              type: string
            pricing_unit:
              $ref: "#/components/schemas/TrainingPricingUnit"
        resolved_event_ticket_tiers:
          type: array
          description: >
            Effective event tiers for display: instance tiers when present,
            otherwise a synthetic tier from the parent service event defaults.
          items:
            $ref: "#/components/schemas/EventTicketTier"
        resolved_consultation_details:
          type: object
          nullable: true
          description: >
            Effective consultation pricing from the parent service `consultation_details` row
            (tier-per-service catalog).
          properties:
            pricing_model:
              $ref: "#/components/schemas/ConsultationPricingModel"
            price:
              type: string
              nullable: true
            currency:
              type: string
            package_sessions:
              type: integer
              nullable: true
        session_slots:
          type: array
          items:
            $ref: "#/components/schemas/SessionSlot"
        training_details:
          type: object
          nullable: true
          properties:
            training_format:
              $ref: "#/components/schemas/TrainingFormat"
            price:
              type: string
            currency:
              type: string
            pricing_unit:
              $ref: "#/components/schemas/TrainingPricingUnit"
        event_ticket_tiers:
          type: array
          items:
            $ref: "#/components/schemas/EventTicketTier"
        consultation_details:
          type: object
          nullable: true
          properties:
            pricing_model:
              $ref: "#/components/schemas/ConsultationPricingModel"
            price:
              type: string
              nullable: true
            currency:
              type: string
            package_sessions:
              type: integer
              nullable: true
        parent_service_title:
          type: string
          nullable: true
          description: Parent service title (present on cross-service list responses).
        parent_service_tier:
          type: string
          nullable: true
          description: >
            Parent service tier slug (present on cross-service list responses;
