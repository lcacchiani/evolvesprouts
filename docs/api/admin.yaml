        title:
          type: string
        service_key:
          type: string
          nullable: true
          maxLength: 80
          pattern: ^[a-z0-9]+(-[a-z0-9]+)*$
          description: Optional service key (lowercase letters, numbers, hyphens).
        booking_system:
          type: string
          nullable: true
          maxLength: 80
          description: Optional booking system label (free-form text).
        description:
          type: string
          nullable: true
        cover_image_s3_key:
