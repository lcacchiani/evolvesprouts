    CreateManualInboundCustomerPaymentRequest:
      type: object
      required:
        - direction
        - enrollmentId
        - amount
        - currency
        - method
      properties:
        direction:
          type: string
          enum: [inbound]
        enrollmentId:
          type: string
          format: uuid
        amount:
          type: string
          description: Decimal amount as string; must be non-negative.
        currency:
          type: string
          minLength: 3
          maxLength: 3
