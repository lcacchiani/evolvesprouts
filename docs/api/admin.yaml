  /v1/admin/audit-logs:
    get:
      summary: List audit log entries
      description: >
        Returns database audit history (trigger- and application-sourced rows in
        `audit_log`). Optional filters combine as in the admin Lambda handler:
        when `record_id` is set, `table` is required; `user_id` is a Cognito subject
        (sub), not an email address. Use `email` to filter by Cognito email (server
        resolves to sub); do not pass `user_id` together with `email`.
      security:
        - AdminBearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: cursor
          in: query
          required: false
          description: Opaque continuation token from `next_cursor` for the default recent listing.
          schema:
            type: string
        - name: table
          in: query
          required: false
          schema:
            type: string
            enum:
              - assets
              - asset_access_grants
              - calendar_manual_blocks
              - customer_invoice_lines
              - customer_invoices
              - customer_payments
              - customer_receipts
              - payment_allocations
        - name: record_id
          in: query
          required: false
          schema:
            type: string
        - name: user_id
          in: query
          required: false
          schema:
            type: string
        - name: email
          in: query
          required: false
          description: >
            Filter by the user's Cognito email address. The server resolves this to a
            Cognito `sub` via `list_users`. Mutually exclusive with `user_id`. When no
            user matches, the response is an empty list.
          schema:
            type: string
        - name: action
          in: query
          required: false
          schema:
            type: string
            enum: [INSERT, UPDATE, DELETE]
        - name: since
          in: query
          required: false
          description: ISO 8601 timestamp; only entries at or after this time are returned where applicable.
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paginated audit log list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/audit-logs/{id}:
    get:
      summary: Get audit log entry by id
      security:
        - AdminBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Audit log entry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLog"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

