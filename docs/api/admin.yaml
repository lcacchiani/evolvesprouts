  /v1/admin/contacts/search:
    get:
      summary: Search CRM contacts for pickers
      description: |
        Returns active contacts matching name, email, Instagram, and **phone** using
        server-side normalisation: ``+`` international forms, long digit strings, and
        substring matches against stored national significant numbers (with optional
        region match when the query resolves to a valid number).
        Requires at least two characters in `query`. Intended for referral and other admin pickers.
      security:
        - AdminBearerAuth: []
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 255
        - name: exclude_contact_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Omit this contact from results (e.g. the subject contact when choosing a referrer).
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Matching contacts as id/label rows.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityPickerListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

