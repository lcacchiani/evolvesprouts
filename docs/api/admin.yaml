          type: string
          format: uuid
        invoiceId:
          type: string
          format: uuid
        invoiceLineId:
          type: string
          format: uuid
          nullable: true
        allocatedAmount:
          type: string
        currency:
          type: string
          minLength: 3
          maxLength: 3
    ExpenseListResponse:
