      type: object
      required:
        - description
        - quantity
        - unitAmount
      description: >
        Line total is computed as quantity × unitAmount − discountAmount + tax.
        Omit discount and tax fields for a simple quantity × unitAmount line.
        Tax may be given as `taxAmount` or derived from `taxRate` × (quantity × unitAmount − discountAmount).
      properties:
        description:
          type: string
          maxLength: 500
        quantity:
          type: string
          description: Decimal quantity; must be positive.
        unitAmount:
          type: string
          description: Decimal unit price in invoice currency.
        discountAmount:
          type: string
          nullable: true
          description: Optional decimal discount; defaults to 0. Must not exceed quantity × unitAmount.
        taxRate:
          type: string
          nullable: true
          description: Optional decimal tax rate applied to taxable amount (quantity × unitAmount − discountAmount). Mutually exclusive with `taxAmount`.
        taxAmount:
          type: string
          nullable: true
          description: Optional explicit decimal tax amount. Mutually exclusive with `taxRate`.
    CreateCustomizedDraftInvoiceRequest:
      type: object
      required:
        - draftKind
        - billTo
        - currency
        - lines
      description: >
        `draftKind` must be `customized_manual`. Creates a draft invoice with manually specified lines.
        Lines are not linked to enrollments (`enrollmentId` is null on each line). At most 50 lines per request.
        Do not send `enrollmentIds` with this request.
      properties:
        draftKind:
          type: string
          enum: [customized_manual]
        billTo:
          $ref: "#/components/schemas/InvoiceBillToInput"
        currency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
        lines:
          type: array
          items:
            $ref: "#/components/schemas/CustomizedInvoiceLineInput"
          minItems: 1
          maxItems: 50
        invoiceDate:
          type: string
          format: date
          nullable: true
          description: Optional ISO date (YYYY-MM-DD). When omitted, defaults to today in INVOICE_DISPLAY_TIMEZONE (or UTC if unset).
    CreatePaymentAllocationRequest:
      type: object
      required:
        - paymentId
        - invoiceId
