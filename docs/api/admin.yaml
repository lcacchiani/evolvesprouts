        - AdminBearerAuth: []
      responses:
        "200":
          description: Organization response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOrganizationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      summary: Update CRM organization
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAdminOrganizationRequest"
      responses:
        "200":
          description: Organization response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOrganizationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete CRM organization
      description: |
        Permanently removes a non-vendor organisation row. Vendor organisations must be
        managed under Finance. Sales leads linked to the organisation (and their lead notes)
        are deleted first; standalone notes and enrollments that reference the organisation
        are cleared. Returns `400` if the database still blocks deletion.
      security:
        - AdminBearerAuth: []
      responses:
        "204":
          description: Organization deleted.
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/organizations/{id}/members:
    parameters:
      - $ref: "#/components/parameters/AdminOrganizationId"
    post:
      summary: Add organization member
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddOrganizationMemberRequest"
      responses:
        "201":
          description: Organization with updated members.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOrganizationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/organizations/{id}/members/{memberId}:
    parameters:
      - $ref: "#/components/parameters/AdminOrganizationId"
      - $ref: "#/components/parameters/AdminOrganizationMemberId"
    patch:
      summary: Update organization member
      description: |
        Updates membership fields such as primary contact. Membership role is derived from the
        linked contact's `contact_type` (see `POST /v1/admin/organizations/{id}/members`).
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganizationMemberRequest"
      responses:
        "200":
          description: Organization with updated members.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOrganizationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Remove organization member
      security:
        - AdminBearerAuth: []
      responses:
        "200":
          description: Organization with updated members.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOrganizationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/billing/export:
    get:
      summary: Export billing CSV (default export v2)
      description: >
        Default `export_version` is **2** (`?exportVersion=2` or omit). v2 rows include
        `document_type` in `payment`, `refund`, `invoice`, `invoice_line`, `receipt`,
        and `allocation` with columns for `payment_method`, `bank_reference` (payment
        `external_reference`), `counterparty_name_snapshot` (invoice line description or
        invoice snapshot display name), `tax_amount`, `created_by` (payment `confirmed_by`),
        bill-to fields on invoice rows, and Stripe / linkage ids. Pass `exportVersion=1`
        for the legacy payments+allocations-only shape.
      security:
        - AdminBearerAuth: []
      parameters:
        - name: exportVersion
          in: query
          required: false
          description: "`1` (legacy) or `2` (default)."
          schema:
            type: string
            enum: ["1", "2"]
            default: "2"
      responses:
        "200":
          description: Accounting-oriented CSV payload.
          content:
            application/json:
              schema:
                type: object
                required:
                  - csv
                properties:
                  csv:
                    type: string
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/admin/billing/payments:
    get:
      summary: List recent customer payments
      security:
        - AdminBearerAuth: []
      parameters:
        - name: invoice_id
          in: query
          required: false
          description: When set, return only payments that have at least one allocation to this invoice.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Payment rows.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/CustomerPaymentSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      summary: Create customer payment row
      description: >
        Creates either an outbound refund (`direction: refund` + `originalPaymentId`) or a
        manual inbound payment linked to an enrollment (`direction: inbound` + `enrollmentId`).
        Succeeded inbound payments follow the same receipt generation path as payment confirm.
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/CreateCustomerRefundRequest"
                - $ref: "#/components/schemas/CreateManualInboundCustomerPaymentRequest"
              discriminator:
                propertyName: direction
                mapping:
                  refund: "#/components/schemas/CreateCustomerRefundRequest"
                  inbound: "#/components/schemas/CreateManualInboundCustomerPaymentRequest"
      responses:
        "201":
          description: Refund or inbound payment created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment:
                    $ref: "#/components/schemas/CustomerPaymentSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/admin/billing/payments/{id}:
    get:
      summary: Get customer payment with unapplied balance
      security:
        - AdminBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Payment detail.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/CustomerPaymentSummary"
                  - type: object
                    properties:
                      unappliedAmount:
                        type: string
                      allocationInvoices:
                        type: array
                        description: Distinct invoices this payment is allocated to (newest invoice first).
                        items:
                          $ref: "#/components/schemas/CustomerPaymentAllocationInvoice"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete orphan inbound customer payment
      description: >
        Removes an inbound payment row only when it is safe cleanup: the payment must be
        pending **or** free ($0 method or zero amount), not linked to an active enrollment
        (enrollment id null, enrollment cancelled, or enrollment row missing), and must have
        no invoice allocations, no customer receipt row, and no refund rows pointing at it.
      security:
        - AdminBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Payment deleted.
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/billing/payments/{id}/unapplied:
    get:
      summary: Unapplied amount for a payment
      security:
        - AdminBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Unapplied remainder.
          content:
            application/json:
              schema:
                type: object
                properties:
                  paymentId:
                    type: string
                    format: uuid
                  unappliedAmount:
                    type: string
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/billing/payments/{id}/confirm:
    post:
      summary: Confirm pending inbound payment (offline rails)
      security:
        - AdminBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                externalReference:
                  type: string
      responses:
        "200":
          description: Payment confirmed and receipt generated when applicable.
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment:
                    $ref: "#/components/schemas/CustomerPaymentSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/billing/enrollments/recent-for-invoicing:
    get:
      summary: List recent enrollments for draft invoice picker
      description: >
        Returns non-cancelled enrollments with `enrolled_at` within the last 730 days
        (two 365-day rolling windows by enrolled date),
        ordered by `enrolled_at` descending (cursor pagination). At most `limit` rows per response
        (default and maximum 500). Pass `next_cursor` from the prior response as `cursor`.
        Optional `q` filters server-side by enrollment UUID substring, instance title, cohort,
        contact email/name, bill-to contact, family name, organization name, or ticket tier name.
        Includes `invoiceLinked` when the enrollment already appears on a draft or issued customer
        invoice line (void invoices do not block).
      security:
        - AdminBearerAuth: []
      parameters:
        - name: cursor
          in: query
          required: false
          description: Opaque cursor from a prior `next_cursor` value.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 500
        - name: q
          in: query
          required: false
          description: Case-insensitive partial match across enrollment id, instance title/cohort, contacts, family/org names, and tier name.
          schema:
            type: string
      responses:
        "200":
          description: Enrollment rows for invoicing UI.
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - truncated
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/BillingEnrollmentPickerRow"
                  truncated:
                    type: boolean
                    description: True when another page may exist (results reached `limit`).
                  next_cursor:
                    type: string
                    nullable: true
                    description: Cursor for the next page when `truncated` is true.
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/admin/billing/invoices:
    get:
      summary: List customer invoices
      description: >
        Cursor-paginated list ordered by `created_at` descending, then `id` descending.
        Pass `next_cursor` from the previous response as `cursor` for the next page.
        Returns all invoices for the tenant; **admin authorization is required** (API Gateway admin group).
        Filter by optional `currency` (three-letter ISO code) and `status`.
      security:
        - AdminBearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [draft, issued, void]
        - name: currency
          in: query
          required: false
          description: Three-letter ISO currency code (for example HKD).
          schema:
            type: string
            minLength: 3
            maxLength: 3
        - name: cursor
          in: query
          required: false
          description: Opaque cursor from a prior `next_cursor` value.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Invoice summaries.
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/CustomerInvoiceSummary"
                  next_cursor:
                    type: string
                    nullable: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      summary: Create draft customer invoice
      description: >
        Set `draftKind` to `enrollment_merge` with `enrollmentIds` to merge enrollments into one draft, or
        `customized_manual` with `billTo`, `currency`, and `lines` for manual line items without enrollment links.
        Do not send fields from the other mode (for example `billTo` with `enrollment_merge`).
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/CreateDraftInvoiceRequest"
                - $ref: "#/components/schemas/CreateCustomizedDraftInvoiceRequest"
              discriminator:
                propertyName: draftKind
                mapping:
                  enrollment_merge: "#/components/schemas/CreateDraftInvoiceRequest"
                  customized_manual: "#/components/schemas/CreateCustomizedDraftInvoiceRequest"
      responses:
        "201":
          description: Draft invoice created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoiceId:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [draft]
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/admin/billing/invoices/{id}:
    get:
      summary: Get customer invoice with lines
      security:
        - AdminBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Invoice detail including line items.
          content:
            application/json:
              schema:
                type: object
                required:
                  - invoice
                properties:
                  invoice:
                    $ref: "#/components/schemas/CustomerInvoiceDetail"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete draft customer invoice
      description: >
        Permanently deletes the invoice and its line rows. Allowed only when the invoice
        status is `draft`. Returns 400 if the invoice is issued or void, or when any
        `payment_allocations` row references the invoice.
      security:
        - AdminBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Invoice deleted.
          content:
            application/json:
              schema:
                type: object
                required:
                  - invoiceId
                  - deleted
                properties:
                  invoiceId:
                    type: string
                    format: uuid
                  deleted:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/billing/invoices/{id}/pdf:
    get:
      summary: Get time-limited URL to open invoice PDF
      description: >
        Returns a CloudFront-signed GET URL for the invoice PDF. Issued invoices use the canonical
        stored object; draft and void invoices render current lines to a preview key without mutating
        issued PDF metadata.
      security:
        - AdminBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Signed download URL and expiry.
          content:
            application/json:
              schema:
                type: object
                required:
                  - downloadUrl
                  - expiresAt
                properties:
                  downloadUrl:
                    type: string
                    format: uri
                  expiresAt:
                    type: string
                    format: date-time
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/billing/invoices/{id}/issue:
    post:
      summary: Issue invoice (assign number, PDF hash)
      security:
        - AdminBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Invoice issued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoiceId:
                    type: string
                    format: uuid
                  invoiceNumber:
                    type: string
                  issuedPdfSha256:
                    type: string
                    nullable: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/billing/invoices/{id}/void:
    post:
      summary: Void invoice (draft or issued)
      description: >
        Voids a draft or issued invoice. Returns 400 if already void.
        Application audit rows distinguish `VOID_FROM_DRAFT` vs `VOID_FROM_ISSUED`.
      security:
        - AdminBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Invoice voided.
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoiceId:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [void]
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/billing/invoices/{id}/email:
    post:
      summary: Email issued invoice PDF
      security:
        - AdminBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - toEmail
              properties:
                toEmail:
                  type: string
                  description: >
                    Recipient email address(es). Multiple addresses may be given as a
                    comma-separated list (optional semicolons are treated like commas).
                  example: "billing@example.com, accounts@example.com"
      responses:
        "200":
          description: Email sent (best-effort).
          content:
            application/json:
              schema:
                type: object
                properties:
                  sent:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/billing/allocations:
    post:
      summary: Allocate payment amount to invoice
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentAllocationRequest"
      responses:
        "201":
          description: Allocation created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  allocationId:
                    type: string
                    format: uuid
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/expenses:
    get:
      summary: List expenses
      description: >-
        Returns expenses ordered by invoice issue date (`invoice_date`) descending;
        rows without an invoice date appear after dated rows. Pagination uses stable
        key order (`invoice_date`, `id`).
      security:
        - AdminBearerAuth: []
      parameters:
        - name: query
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ExpenseStatus"
        - name: parse_status
          in: query
          schema:
            $ref: "#/components/schemas/ExpenseParseStatus"
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Expense list response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      summary: Create expense
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExpenseRequest"
      responses:
        "201":
          description: Expense created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/admin/expenses/import-from-bulk-pdf:
    post:
      summary: Queue import of multiple expenses from one combined PDF
      description: >
        Upload a PDF as an admin asset, then call this endpoint with its asset id.
        The API enqueues an asynchronous OpenRouter bulk parse (SQS + dedicated Lambda)
        and returns **202** with a `bulk_import_job` id. Poll
        `GET /v1/admin/expenses/bulk-import-jobs/{job_id}` until `status` is `succeeded`,
        `succeeded_with_errors` (partial row failures; see `error_message`), or `failed`
        (`error_message` is set). You can also list recent jobs via
        `GET /v1/admin/expenses/bulk-import-jobs`.
        Parsed vendor names are matched to active vendors when possible; otherwise
        `default_vendor_id` is used.
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkImportExpensesFromPdfRequest"
      responses:
        "202":
          description: Bulk import job accepted for asynchronous processing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportJobResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/expenses/bulk-import-jobs:
    get:
      summary: List bulk PDF import jobs for the signed-in admin
      description: >
        Returns jobs created by the authenticated admin, newest first. Use this to
        recover visibility after refresh or when polling times out.
      security:
        - AdminBearerAuth: []
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Paginated bulk import jobs for the current admin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportJobListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/admin/expenses/bulk-import-jobs/{job_id}:
    parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Identifier returned from `POST /v1/admin/expenses/import-from-bulk-pdf`.
    get:
      summary: Get bulk PDF import job status
      description: >
        Poll this endpoint until `bulk_import_job.status` is `succeeded`,
        `succeeded_with_errors`, or `failed`. Only the admin user who created the job
        may read it.
      security:
        - AdminBearerAuth: []
      responses:
        "200":
          description: Current job state (and expenses when the job finished with successes).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportJobResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/expenses/{id}:
    parameters:
      - $ref: "#/components/parameters/ExpenseId"
    get:
      summary: Get expense
      security:
        - AdminBearerAuth: []
      responses:
        "200":
          description: Expense response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      summary: Update expense
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExpenseRequest"
      responses:
        "200":
          description: Expense response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete draft expense
      description: >
        Hard-deletes the expense row when its status is `draft`. Returns **400** when the expense is
        not a draft or when other expense rows reference this record as their amendment parent.
      security:
        - AdminBearerAuth: []
      responses:
        "204":
          description: Expense deleted.
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/expenses/{id}/cancel:
    parameters:
      - $ref: "#/components/parameters/ExpenseId"
    post:
      summary: Soft-void an expense
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelExpenseRequest"
      responses:
        "200":
          description: Expense response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/expenses/{id}/mark-paid:
    parameters:
      - $ref: "#/components/parameters/ExpenseId"
    post:
      summary: Mark an expense as paid
      description: >
        Requires a linked vendor, invoice date, currency code, and total amount.
        Returns 400 if any of these are missing.
      security:
        - AdminBearerAuth: []
      responses:
        "200":
          description: Expense response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/expenses/{id}/reparse:
    parameters:
      - $ref: "#/components/parameters/ExpenseId"
    post:
      summary: Queue expense parse request
      security:
        - AdminBearerAuth: []
      responses:
        "202":
          description: Parse request queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionMessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/expenses/{id}/amend:
    parameters:
      - $ref: "#/components/parameters/ExpenseId"
    post:
      summary: Create amendment expense record
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExpenseRequest"
      responses:
        "201":
          description: Amendment expense created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete discount code
      security:
        - AdminBearerAuth: []
      responses:
        "204":
          description: Discount code deleted.
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/user/assets:
    get:
      summary: List user assets
      description: Route for any authenticated Cognito user.
      security:
        - UserBearerAuth: []
      responses:
        "200":
          description: User asset list response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/user/assets/{id}/download:
    parameters:
      - $ref: "#/components/parameters/AssetId"
    get:
      summary: Generate user asset download
      security:
        - UserBearerAuth: []
      responses:
        "200":
          description: Download response payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetDownloadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    SigV4Auth:
      type: apiKey
      in: header
      name: Authorization
      description: |
        AWS Signature Version 4 signed Authorization header (IAM auth).
    AdminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Cognito JWT validated by AdminGroupAuthorizerFunction.
    UserBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Cognito JWT validated by UserAuthorizerFunction.

  parameters:
    AssetId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Asset identifier.
    GrantId:
      name: grantId
      in: path
      required: true
      schema:
        type: string
      description: Asset grant identifier.
    LocationId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Location identifier.
    LeadId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Sales lead identifier.
    ServiceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Service identifier.
    InstanceId:
      name: instanceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Service instance identifier.
    EnrollmentId:
      name: enrollmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Enrollment identifier.
    DiscountCodeId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Discount code identifier.
    AdminContactId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: CRM contact identifier.
    NoteId:
      name: noteId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: CRM note identifier.
    AdminFamilyId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: CRM family identifier.
    AdminFamilyMemberId:
      name: memberId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Family membership row identifier.
    AdminOrganizationId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: CRM organization identifier.
    AdminOrganizationMemberId:
      name: memberId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Organization membership row identifier.
    ExpenseId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Expense identifier.

  responses:
    BadRequest:
      description: Validation or request format error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authorization failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    AssetTagRef:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        color:
          type: string
          nullable: true
          description: Optional CSS color (e.g. hex).
    Asset:
      type: object
      required:
        - id
        - title
        - asset_type
        - s3_key
        - file_name
        - visibility
        - tags
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        asset_type:
          type: string
          enum: [guide, video, pdf, document]
        s3_key:
          type: string
        file_name:
          type: string
        content_type:
          type: string
          nullable: true
        content_language:
          type: string
          nullable: true
          description: >
            BCP 47-style tag for the language of the file content. Admin create/update accepts only
            en, zh-CN, or zh-HK (null clears). Public list filters accept any valid BCP 47-style tag.
        resource_key:
          type: string
          nullable: true
          description: Optional normalized key used to map public media submissions to this asset.
        visibility:
          type: string
          enum: [public, restricted]
        tags:
          type: array
          items:
            $ref: "#/components/schemas/AssetTagRef"
          description: Tags on this asset. Non-admin asset list responses use an empty array when tags are not loaded.
        created_by:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
    AssetGrant:
      type: object
      required:
        - id
        - asset_id
        - grant_type
      properties:
        id:
          type: string
          format: uuid
        asset_id:
          type: string
          format: uuid
        grant_type:
          type: string
          enum: [all_authenticated, organization, user]
        grantee_id:
          type: string
          nullable: true
        granted_by:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
    AssetListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Asset"
        next_cursor:
          type: string
          nullable: true
        linked_tag_names:
          type: array
          items:
            type: string
          description: >
            Admin asset list only. Distinct tag names linked to at least one asset matching
            the request's asset_type filter (when provided). Omitted or empty when not applicable.
    AssetResponse:
      type: object
      required:
        - asset
      properties:
        asset:
          $ref: "#/components/schemas/Asset"
    AssetGrantListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AssetGrant"
    AssetGrantResponse:
      type: object
      required:
        - grant
      properties:
        grant:
          $ref: "#/components/schemas/AssetGrant"
    AssetDownloadResponse:
      type: object
      required:
        - asset_id
        - download_url
        - expires_at
      properties:
        asset_id:
          type: string
        download_url:
          type: string
          format: uri
          description: CloudFront-signed URL generated for this request.
        expires_at:
          type: string
          format: date-time
    AssetShareLinkResponse:
      type: object
      required:
        - asset_id
        - share_url
        - allowed_domains
      properties:
        asset_id:
          type: string
        share_url:
          type: string
          format: uri
          description: Stable bearer link that resolves to a fresh signed download URL.
        allowed_domains:
          type: array
          minItems: 1
          items:
            type: string
          description: Allowlisted source domains allowed to resolve this share link.
    AssetShareLinkPolicyRequest:
      type: object
      required:
        - allowed_domains
      properties:
        allowed_domains:
          type: array
          minItems: 1
          items:
            type: string
          description: |
            Domain allowlist for share-link resolution, for example
            `www.example.com`.
    FunnelStage:
      type: string
      enum: [new, contacted, engaged, qualified, converted, lost]
    LeadType:
      type: string
      enum: [free_guide, event_inquiry, program_enrollment, consultation, partnership, other]
    LeadEventType:
      type: string
      enum:
        [
          created,
          stage_changed,
          note_added,
          email_sent,
          email_opened,
          guide_downloaded,
          assigned,
          converted,
          lost,
        ]
    ContactSource:
      type: string
      enum:
        [
          free_guide,
          newsletter,
          contact_form,
          reservation,
          referral,
          instagram,
          manual,
          whatsapp,
          linkedin,
          event,
          phone_call,
          public_website,
        ]
    LeadContact:
      type: object
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone_region:
          type: string
          minLength: 2
          maxLength: 2
          pattern: "^[A-Z]{2}$"
          nullable: true
        phone_national_number:
          type: string
          pattern: "^[0-9]+$"
          maxLength: 20
          nullable: true
        phone_e164:
          type: string
          pattern: "^\\+[1-9][0-9]{1,14}$"
          nullable: true
          readOnly: true
        instagram_handle:
          type: string
          nullable: true
        source:
          type: string
          enum:
            [
              free_guide,
              newsletter,
              contact_form,
              reservation,
              referral,
              instagram,
              manual,
              whatsapp,
              linkedin,
              event,
              phone_call,
              public_website,
            ]
          nullable: true
        source_detail:
          type: string
          nullable: true
        contact_type:
          type: string
          nullable: true
        relationship_type:
          type: string
          nullable: true
    LeadEvent:
      type: object
      required:
        - id
        - event_type
      properties:
        id:
          type: string
          format: uuid
        event_type:
          $ref: "#/components/schemas/LeadEventType"
        from_stage:
          type: string
          enum: [new, contacted, engaged, qualified, converted, lost]
          nullable: true
        to_stage:
          type: string
          enum: [new, contacted, engaged, qualified, converted, lost]
          nullable: true
        metadata:
          type: object
          nullable: true
          additionalProperties: true
        created_by:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
    Note:
      type: object
      required:
        - id
        - content
        - created_by
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AdminNoteListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Note"
    CreateNoteRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
    UpdateNoteRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
    LeadSummary:
      type: object
      required:
        - id
        - contact
        - lead_type
        - funnel_stage
        - tags
      properties:
        id:
          type: string
          format: uuid
        contact:
          $ref: "#/components/schemas/LeadContact"
        lead_type:
          $ref: "#/components/schemas/LeadType"
        funnel_stage:
          $ref: "#/components/schemas/FunnelStage"
        assigned_to:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        converted_at:
          type: string
          format: date-time
          nullable: true
        lost_at:
          type: string
          format: date-time
          nullable: true
        lost_reason:
          type: string
          nullable: true
        days_in_stage:
          type: integer
        last_activity_at:
          type: string
          format: date-time
          nullable: true
        tags:
          type: array
          items:
            type: string
    LeadDetail:
      allOf:
        - $ref: "#/components/schemas/LeadSummary"
        - type: object
          properties:
            family:
              type: object
              nullable: true
            organization:
              type: object
              nullable: true
            events:
              type: array
              items:
                $ref: "#/components/schemas/LeadEvent"
            notes:
              type: array
              items:
                $ref: "#/components/schemas/Note"
    LeadListResponse:
      type: object
      required:
        - items
        - total_count
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/LeadSummary"
        next_cursor:
          type: string
          nullable: true
        total_count:
          type: integer
    LeadDetailResponse:
      type: object
      required:
        - lead
      properties:
        lead:
          $ref: "#/components/schemas/LeadDetail"
    CreateLeadRequest:
      type: object
      required:
        - first_name
        - source
        - lead_type
      properties:
        first_name:
          type: string
        last_name:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone_region:
          type: string
          minLength: 2
          maxLength: 2
          pattern: "^[A-Z]{2}$"
          nullable: true
          description: |
            ISO 3166-1 alpha-2 region. Omit both `phone_region` and `phone_number` to leave
            phone unchanged on create; send both keys with JSON `null` to clear phone.
        phone_number:
          type: string
          pattern: "^[0-9]+$"
          maxLength: 20
          nullable: true
          description: National significant digits only; must be provided with `phone_region` when setting phone.
        instagram_handle:
          type: string
          nullable: true
        source:
          $ref: "#/components/schemas/ContactSource"
        source_detail:
          type: string
          nullable: true
        lead_type:
          $ref: "#/components/schemas/LeadType"
        contact_type:
          type: string
          nullable: true
        assigned_to:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
    UpdateLeadRequest:
      type: object
      minProperties: 1
      properties:
        funnel_stage:
          $ref: "#/components/schemas/FunnelStage"
        assigned_to:
          type: string
          nullable: true
        lost_reason:
          type: string
          nullable: true
    LeadAnalyticsResponse:
      type: object
      required:
        - funnel
      properties:
        funnel:
          type: object
          additionalProperties:
            type: integer
        conversion_rate:
          type: number
        avg_days_to_convert:
          type: number
          nullable: true
        leads_this_week:
          type: integer
        leads_this_month:
          type: integer
        source_breakdown:
          type: object
          additionalProperties:
            type: integer
        stage_conversion_rates:
          type: object
          additionalProperties:
            type: number
        avg_days_in_stage:
          type: object
          additionalProperties:
            type: number
        leads_over_time:
          type: array
          items:
            type: object
            required: [period, count]
            properties:
              period:
                type: string
              count:
                type: integer
        assignee_stats:
          type: array
          items:
            type: object
            required: [assigned_to, total, converted, conversion_rate]
            properties:
              assigned_to:
                type: string
                nullable: true
              total:
                type: integer
              converted:
                type: integer
              conversion_rate:
                type: number
    ServiceType:
      type: string
      enum: [training_course, event, consultation, intro_call]
      description: |
        Product category for a service template. `intro_call` is the free public intro-call flow
        (`service_key` / instance slug pair used by public reservations); it stores consultation-style
        pricing defaults like `consultation`.
    ServiceStatus:
      type: string
      enum: [draft, published, archived]
    ServiceDeliveryMode:
      type: string
      enum: [online, in_person, hybrid]
    TrainingFormat:
      type: string
      enum: [group, private]
    TrainingPricingUnit:
      type: string
      enum: [per_person, per_family]
    EventCategory:
      type: string
      enum: [workshop, webinar, open_house, community_meetup, other]
    ConsultationFormat:
      type: string
      enum: [one_on_one, group]
    ConsultationPricingModel:
      type: string
      enum: [free, hourly, package]
    InstanceStatus:
      type: string
      enum: [scheduled, open, full, in_progress, completed, cancelled]
    DiscountType:
      type: string
      enum: [percentage, absolute, referral]
      description: |
        Discount type. `referral` codes are tracking-only: the server always
        coerces `discount_value` to "0" and `currency` to "HKD", and the public
        discount-validate endpoint rejects referral codes.
    EnrollmentStatus:
      type: string
      enum: [registered, waitlisted, confirmed, cancelled, completed]
    ServiceTrainingDetails:
      type: object
      properties:
        pricing_unit:
          $ref: "#/components/schemas/TrainingPricingUnit"
        default_price:
          type: string
          nullable: true
        default_currency:
          type: string
          nullable: true
    ServiceEventDetails:
      type: object
      properties:
        event_category:
          $ref: "#/components/schemas/EventCategory"
        default_price:
          type: string
          nullable: true
          pattern: ^-?\d+(\.\d{1,2})?$
          description: Optional default ticket price for new event instances.
        default_currency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: ^[A-Z]{3}$
          description: ISO 4217 currency code for default_price (defaults to HKD).
    ServiceConsultationDetails:
      type: object
      properties:
        consultation_format:
          $ref: "#/components/schemas/ConsultationFormat"
        max_group_size:
          type: integer
          nullable: true
        duration_minutes:
          type: integer
          nullable: true
        pricing_model:
          $ref: "#/components/schemas/ConsultationPricingModel"
        default_hourly_rate:
          type: string
          nullable: true
        default_package_price:
          type: string
          nullable: true
        default_package_sessions:
          type: integer
          nullable: true
        default_currency:
          type: string
          nullable: true
    DiscountCodeUsageSummaryResponse:
      type: object
      required:
        - total_current_uses
        - referencing_code_count
      properties:
        total_current_uses:
          type: integer
          minimum: 0
        referencing_code_count:
          type: integer
          minimum: 0
    ServiceSummary:
      type: object
      required:
        - id
        - service_type
        - title
        - delivery_mode
        - status
        - instances_count
      properties:
        id:
          type: string
          format: uuid
        service_type:
          $ref: "#/components/schemas/ServiceType"
        title:
          type: string
        service_key:
          type: string
          nullable: true
          maxLength: 80
          pattern: ^[a-z0-9]+(-[a-z0-9]+)*$
          description: >
            Optional lowercase public service key for URLs and booking identity (e.g. `my-best-auntie-training-course`).
            Uniqueness is enforced case-insensitively in Aurora (with `service_tier`).
        booking_system:
          type: string
          nullable: true
          maxLength: 80
          description: >
            Optional label for which booking system or flow applies to this service
            (free-form text, same max length as service key).
        description:
          type: string
          nullable: true
        cover_image_s3_key:
          type: string
          nullable: true
        delivery_mode:
          $ref: "#/components/schemas/ServiceDeliveryMode"
        status:
          $ref: "#/components/schemas/ServiceStatus"
        service_tier:
          type: string
          nullable: true
          maxLength: 128
          pattern: ^[a-z0-9]+(-[a-z0-9]+)*$
          description: >
            Optional slug-like tier identifier for the service template, shared across all instances.
        location_id:
          type: string
          format: uuid
          nullable: true
          description: >
            Optional default venue UUID (FK to locations.id, ON DELETE SET NULL). Instances may
            override via service_instances.location_id.
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        training_details:
          allOf:
            - $ref: "#/components/schemas/ServiceTrainingDetails"
          nullable: true
          description: Present for training_course rows when details exist.
        event_details:
          allOf:
            - $ref: "#/components/schemas/ServiceEventDetails"
          nullable: true
          description: Present for event rows when details exist.
        consultation_details:
          allOf:
            - $ref: "#/components/schemas/ServiceConsultationDetails"
          nullable: true
          description: Present for consultation rows when details exist.
        instances_count:
          type: integer
          minimum: 0
          description: Number of service instances for this template (list and detail payloads).
    Service:
      allOf:
        - $ref: "#/components/schemas/ServiceSummary"
        - type: object
          properties:
            tag_ids:
              type: array
              items:
                type: string
                format: uuid
            asset_ids:
              type: array
              items:
                type: string
                format: uuid
            training_details:
              $ref: "#/components/schemas/ServiceTrainingDetails"
            event_details:
              $ref: "#/components/schemas/ServiceEventDetails"
            consultation_details:
              $ref: "#/components/schemas/ServiceConsultationDetails"
    ServiceListResponse:
      type: object
      required: [items, total_count]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ServiceSummary"
        next_cursor:
          type: string
          nullable: true
        total_count:
          type: integer
    ServiceResponse:
      type: object
      required: [service]
