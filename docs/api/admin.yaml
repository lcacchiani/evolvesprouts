          type: integer
          minimum: 0
    AdminFamilyResponse:
      type: object
      required:
        - family
      properties:
        family:
          $ref: "#/components/schemas/AdminFamily"
    CreateAdminFamilyRequest:
      type: object
      required:
        - family_name
      properties:
        family_name:
          type: string
          maxLength: 150
        relationship_type:
          $ref: "#/components/schemas/EntityFamilyRelationshipType"
        location_id:
          type: string
          format: uuid
          nullable: true
        tag_ids:
          type: array
          items:
            type: string
            format: uuid
    UpdateAdminFamilyRequest:
      type: object
      properties:
        family_name:
          type: string
          maxLength: 150
        relationship_type:
          $ref: "#/components/schemas/EntityFamilyRelationshipType"
        location_id:
          type: string
          format: uuid
          nullable: true
        active:
          type: boolean
        tag_ids:
          type: array
          items:
            type: string
            format: uuid
    AddFamilyMemberRequest:
      type: object
      required:
        - contact_id
      properties:
        contact_id:
          type: string
          format: uuid
        role:
          type: string
          deprecated: true
          description: |
            Ignored. Membership role is derived from the contact's `contact_type` (parent, child,
            helper map to the same family roles; professional and other map to `other`).
        is_primary_contact:
          type: boolean
    UpdateFamilyMemberRequest:
      type: object
      required:
        - is_primary_contact
      properties:
        is_primary_contact:
          type: boolean
          description: |
            When true, this member becomes the family's sole primary contact. When false, this
            member is cleared as primary (other members are unchanged).
    UpdateOrganizationMemberRequest:
      type: object
      required:
        - is_primary_contact
      properties:
        is_primary_contact:
          type: boolean
          description: |
            When true, this member becomes the organisation's sole primary contact. When false, this
            member is cleared as primary (other members are unchanged).
    AdminOrganizationMember:
      type: object
      required:
        - id
        - contact_id
        - contact_label
        - role
        - is_primary_contact
      properties:
        id:
          type: string
          format: uuid
        contact_id:
          type: string
          format: uuid
        contact_label:
          type: string
        role:
          $ref: "#/components/schemas/EntityOrganizationRole"
          description: |
            Stored organisation membership role derived from the contact's `contact_type` (parent,
            helper, and professional map to `staff`; child maps to `member`; other maps to
            `other`).
        is_primary_contact:
          type: boolean
    AdminOrganization:
      type: object
      required:
        - id
        - name
        - organization_type
        - relationship_type
        - active
        - tag_ids
        - tags
        - members
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        organization_type:
          $ref: "#/components/schemas/EntityOrganizationType"
        relationship_type:
          $ref: "#/components/schemas/EntityRelationshipType"
        partner_key:
          type: string
          nullable: true
          description: >
            Optional URL-safe partner key for partner organisations only (lowercase
            letters, digits, single hyphens between segments). Null when not a partner
            or unset. Uniqueness is enforced case-insensitively among partner rows.
        website:
          type: string
          nullable: true
        location_id:
          type: string
          format: uuid
          nullable: true
        location_summary:
          allOf:
            - $ref: "#/components/schemas/EntityLocationVenueSummary"
          nullable: true
        active:
          type: boolean
        archived_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        tag_ids:
          type: array
          items:
            type: string
            format: uuid
        tags:
          type: array
          items:
            $ref: "#/components/schemas/EntityTagRef"
        members:
          type: array
          items:
            $ref: "#/components/schemas/AdminOrganizationMember"
    AdminOrganizationListResponse:
      type: object
      required:
        - items
        - total_count
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AdminOrganization"
