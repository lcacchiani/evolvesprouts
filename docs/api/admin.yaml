          type: string
          description: >
            Stored billing method after normalization (for example `bank_transfer`, `fps`,
            `stripe_card`, `cash`, `free`). Zero amounts are coerced to `free` and `succeeded`.
          minLength: 1
          maxLength: 64
        status:
          type: string
          enum: [pending, succeeded]
          default: pending
          description: >
            `pending` for funds not yet cleared; `succeeded` when funds are received (receipt
            generation follows server rules). Zero amounts are always stored as succeeded `free`.
        externalReference:
          type: string
          nullable: true
          description: Optional bank reference or external id stored on the payment row.
    BillingEnrollmentPickerRow:
      type: object
      additionalProperties: false
      required:
        - enrollmentId
        - partyDisplayName
        - invoiceLinked
        - currency
        - billToMergeKey
      properties:
        enrollmentId:
          type: string
          format: uuid
        partyDisplayName:
          type: string
          description: >
            Display label for the bill-to / enrollment party. For `contact` the admin UI combines
            this with `partyEmail` as `name · email` when both are known. For `family` or `organization`
            this is `entity name · primary contact name` (middle dot) when both the entity and primary
            contact names are known; otherwise the best available single label.
        partyEmail:
          type: string
          format: email
          nullable: true
        billToKind:
          type: string
          enum:
            - contact
            - family
            - organization
          description: Bill-to kind for this enrollment (matches `billing_bill_to_kind`).
        instanceTitle:
          type: string
          nullable: true
          description: Trimmed instance-specific title when set.
        parentServiceTitle:
          type: string
          nullable: true
          description: Parent service template title from the instance's service (for display when `instanceTitle` is empty).
        serviceTierName:
          type: string
          nullable: true
          description: >
            Display tier label: event ticket tier name when the enrollment has a ticket tier;
            otherwise the parent service's `service_tier` when present.
        instanceCohort:
          type: string
          nullable: true
        amountPaid:
          type: string
          description: Decimal amount as string; mirrors enrollment `amount_paid`.
          nullable: true
        currency:
          type: string
          minLength: 3
          maxLength: 3
        enrolledAt:
          type: string
          format: date-time
          nullable: true
        invoiceLinked:
          type: boolean
          description: True when linked to a draft or issued invoice line.
        billToMergeKey:
          type: string
          description: Stable client-side key for matching bill-to identity across enrollments.
    CreateDraftInvoiceRequest:
      type: object
      required:
        - draftKind
        - enrollmentIds
      description: >
        `draftKind` must be `enrollment_merge`. Invoice currency defaults to the shared enrollment currency
        (all enrollments must match). Optional `currency` must equal that currency when provided.
        Line totals default to each enrollment's `amount_paid` at draft time.
        Optional `lineTotalsByEnrollmentId` maps enrollment UUID strings to decimal
        amounts to override mispriced or stale `amount_paid` before issue.
        Do not send `billTo` or `lines` with this request.
      properties:
        draftKind:
          type: string
          enum: [enrollment_merge]
        enrollmentIds:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
        currency:
          type: string
          nullable: true
          description: Optional ISO currency code; when set must match every enrollment. Omit to derive.
          pattern: "^[A-Z]{3}$"
        lineTotalsByEnrollmentId:
          type: object
          additionalProperties:
            type: string
            description: Decimal amount as string
        invoiceDate:
          type: string
          format: date
          nullable: true
          description: Optional ISO date (YYYY-MM-DD). When omitted, defaults to today in INVOICE_DISPLAY_TIMEZONE (or UTC if unset).
    InvoiceBillToInput:
      type: object
      required:
        - kind
      description: >
        Bill-to party for a customized draft. Supply exactly one of contactId, familyId, or organizationId
        matching `kind`.
      properties:
        kind:
          type: string
          enum: [contact, family, organization]
        contactId:
          type: string
          format: uuid
          description: Required when kind is contact.
        familyId:
          type: string
          format: uuid
          description: Required when kind is family.
        organizationId:
          type: string
          format: uuid
          description: Required when kind is organization.
