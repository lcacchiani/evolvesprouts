    get:
      summary: Generate user asset download
      security:
        - UserBearerAuth: []
      responses:
        "200":
          description: Download response payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetDownloadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    SigV4Auth:
      type: apiKey
      in: header
      name: Authorization
      description: |
        AWS Signature Version 4 signed Authorization header (IAM auth).
    AdminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Cognito JWT validated by AdminGroupAuthorizerFunction.
    UserBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Cognito JWT validated by UserAuthorizerFunction.

  parameters:
    AssetId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Asset identifier.
    GrantId:
      name: grantId
      in: path
      required: true
      schema:
        type: string
      description: Asset grant identifier.
    LocationId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Location identifier.
    LeadId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Sales lead identifier.
    ServiceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Service identifier.
    InstanceId:
      name: instanceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Service instance identifier.
    EnrollmentId:
      name: enrollmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Enrollment identifier.
    DiscountCodeId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Discount code identifier.
    VendorId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Vendor identifier.
    AdminContactId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: CRM contact identifier.
    AdminFamilyId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: CRM family identifier.
    AdminFamilyMemberId:
      name: memberId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Family membership row identifier.
    AdminOrganizationId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: CRM organization identifier.
    AdminOrganizationMemberId:
      name: memberId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Organization membership row identifier.
    ExpenseId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Expense identifier.

  responses:
    BadRequest:
      description: Validation or request format error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authorization failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    AssetTagRef:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        color:
          type: string
          nullable: true
          description: Optional CSS color (e.g. hex).
    Asset:
      type: object
      required:
        - id
        - title
        - asset_type
        - s3_key
        - file_name
        - visibility
        - tags
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        asset_type:
          type: string
          enum: [guide, video, pdf, document]
        s3_key:
          type: string
        file_name:
          type: string
        content_type:
          type: string
          nullable: true
        resource_key:
          type: string
          nullable: true
          description: Optional normalized key used to map public media submissions to this asset.
        visibility:
          type: string
          enum: [public, restricted]
        tags:
          type: array
          items:
            $ref: "#/components/schemas/AssetTagRef"
          description: Tags on this asset. Non-admin asset list responses use an empty array when tags are not loaded.
        created_by:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
    AssetGrant:
      type: object
      required:
        - id
        - asset_id
        - grant_type
      properties:
        id:
          type: string
          format: uuid
        asset_id:
          type: string
          format: uuid
        grant_type:
          type: string
          enum: [all_authenticated, organization, user]
        grantee_id:
          type: string
          nullable: true
        granted_by:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
    AssetListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Asset"
        next_cursor:
          type: string
          nullable: true
        linked_tag_names:
          type: array
          items:
            type: string
          description: >
            Admin asset list only. Distinct tag names linked to at least one asset matching
            the request's asset_type filter (when provided). Omitted or empty when not applicable.
    AssetResponse:
      type: object
      required:
        - asset
      properties:
        asset:
          $ref: "#/components/schemas/Asset"
    AssetGrantListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AssetGrant"
    AssetGrantResponse:
      type: object
      required:
        - grant
      properties:
        grant:
          $ref: "#/components/schemas/AssetGrant"
    AssetDownloadResponse:
      type: object
      required:
        - asset_id
        - download_url
        - expires_at
      properties:
        asset_id:
          type: string
        download_url:
          type: string
          format: uri
          description: CloudFront-signed URL generated for this request.
        expires_at:
          type: string
          format: date-time
    AssetShareLinkResponse:
      type: object
      required:
        - asset_id
        - share_url
        - allowed_domains
      properties:
        asset_id:
          type: string
        share_url:
          type: string
          format: uri
          description: Stable bearer link that resolves to a fresh signed download URL.
        allowed_domains:
          type: array
          minItems: 1
          items:
            type: string
          description: Allowlisted source domains allowed to resolve this share link.
    AssetShareLinkPolicyRequest:
      type: object
      required:
        - allowed_domains
      properties:
        allowed_domains:
          type: array
          minItems: 1
          items:
            type: string
          description: |
            Domain allowlist for share-link resolution, for example
            `www.example.com`.
    FunnelStage:
      type: string
      enum: [new, contacted, engaged, qualified, converted, lost]
    LeadType:
      type: string
      enum: [free_guide, event_inquiry, program_enrollment, consultation, partnership, other]
    LeadEventType:
      type: string
      enum:
        [
          created,
          stage_changed,
          note_added,
          email_sent,
          email_opened,
          guide_downloaded,
          assigned,
          converted,
          lost,
        ]
    ContactSource:
      type: string
      enum:
        [
          free_guide,
          newsletter,
          contact_form,
          reservation,
          referral,
          instagram,
          manual,
          whatsapp,
          linkedin,
          event,
          phone_call,
          public_website,
        ]
    LeadContact:
      type: object
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        instagram_handle:
          type: string
          nullable: true
        source:
          type: string
          enum:
            [
              free_guide,
              newsletter,
              contact_form,
              reservation,
              referral,
              instagram,
              manual,
              whatsapp,
              linkedin,
              event,
              phone_call,
              public_website,
            ]
          nullable: true
        source_detail:
          type: string
          nullable: true
        contact_type:
          type: string
          nullable: true
        relationship_type:
          type: string
          nullable: true
    LeadEvent:
      type: object
      required:
        - id
        - event_type
      properties:
        id:
          type: string
          format: uuid
        event_type:
          $ref: "#/components/schemas/LeadEventType"
        from_stage:
          type: string
          enum: [new, contacted, engaged, qualified, converted, lost]
          nullable: true
        to_stage:
          type: string
          enum: [new, contacted, engaged, qualified, converted, lost]
          nullable: true
        metadata:
          type: object
          nullable: true
          additionalProperties: true
        created_by:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
    LeadNote:
      type: object
      required:
        - id
        - content
        - created_by
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
          nullable: true
    LeadSummary:
      type: object
      required:
        - id
        - contact
        - lead_type
        - funnel_stage
        - tags
      properties:
        id:
          type: string
          format: uuid
        contact:
          $ref: "#/components/schemas/LeadContact"
        lead_type:
          $ref: "#/components/schemas/LeadType"
        funnel_stage:
          $ref: "#/components/schemas/FunnelStage"
        assigned_to:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        converted_at:
          type: string
          format: date-time
          nullable: true
        lost_at:
          type: string
          format: date-time
          nullable: true
        lost_reason:
          type: string
          nullable: true
        days_in_stage:
          type: integer
        last_activity_at:
          type: string
          format: date-time
          nullable: true
        tags:
          type: array
          items:
            type: string
    LeadDetail:
      allOf:
        - $ref: "#/components/schemas/LeadSummary"
        - type: object
          properties:
            family:
              type: object
              nullable: true
            organization:
              type: object
              nullable: true
            events:
              type: array
              items:
                $ref: "#/components/schemas/LeadEvent"
            notes:
              type: array
              items:
                $ref: "#/components/schemas/LeadNote"
    LeadListResponse:
      type: object
      required:
        - items
        - total_count
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/LeadSummary"
        next_cursor:
          type: string
          nullable: true
        total_count:
          type: integer
    LeadDetailResponse:
      type: object
      required:
        - lead
      properties:
        lead:
          $ref: "#/components/schemas/LeadDetail"
    CreateLeadRequest:
      type: object
      required:
        - first_name
        - source
        - lead_type
      properties:
        first_name:
          type: string
        last_name:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        instagram_handle:
          type: string
          nullable: true
        source:
          $ref: "#/components/schemas/ContactSource"
        source_detail:
          type: string
          nullable: true
        lead_type:
          $ref: "#/components/schemas/LeadType"
        contact_type:
          type: string
          nullable: true
        assigned_to:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
    UpdateLeadRequest:
      type: object
      minProperties: 1
      properties:
        funnel_stage:
          $ref: "#/components/schemas/FunnelStage"
        assigned_to:
          type: string
          nullable: true
        lost_reason:
          type: string
          nullable: true
    CreateLeadNoteRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
    LeadAnalyticsResponse:
      type: object
      required:
        - funnel
      properties:
        funnel:
          type: object
          additionalProperties:
            type: integer
        conversion_rate:
          type: number
        avg_days_to_convert:
          type: number
          nullable: true
        leads_this_week:
          type: integer
        leads_this_month:
          type: integer
        source_breakdown:
          type: object
          additionalProperties:
            type: integer
        stage_conversion_rates:
          type: object
          additionalProperties:
            type: number
        avg_days_in_stage:
          type: object
          additionalProperties:
            type: number
        leads_over_time:
          type: array
          items:
            type: object
            required: [period, count]
            properties:
              period:
                type: string
              count:
                type: integer
        assignee_stats:
          type: array
          items:
            type: object
            required: [assigned_to, total, converted, conversion_rate]
            properties:
              assigned_to:
                type: string
                nullable: true
              total:
                type: integer
              converted:
                type: integer
              conversion_rate:
                type: number
    ServiceType:
      type: string
      enum: [training_course, event, consultation]
    ServiceStatus:
      type: string
      enum: [draft, published, archived]
    ServiceDeliveryMode:
      type: string
      enum: [online, in_person, hybrid]
