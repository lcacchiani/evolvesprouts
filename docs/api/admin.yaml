  /v1/admin/organizations:
    get:
      summary: List CRM organizations
      description: |
        Lists organizations for CRM and Finance. When `relationship_type` is omitted,
        vendor rows are excluded (Contacts → Organizations default). Pass
        `relationship_type=vendor` for the Finance vendors list only.
        List responses may omit related loads for performance when listing vendors
        (`include_relationships=false` server-side); use `GET /v1/admin/organizations/{id}`
        for full tags, members, and location summary.
      security:
        - AdminBearerAuth: []
      parameters:
        - name: query
          in: query
          schema:
            type: string
        - name: active
          in: query
          schema:
            type: boolean
        - name: relationship_type
          in: query
          description: >
            When set, only organizations with this CRM relationship type are returned
            (e.g. `vendor` for Finance). When omitted, vendors are excluded from the list
            (CRM default).
          schema:
            $ref: "#/components/schemas/EntityRelationshipType"
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
