openapi: 3.0.3
info:
  title: Admin API
  version: 0.3.0
  description: |
    API contract for routes currently wired in
    `backend/infrastructure/lib/api-stack.ts`.

    The current API Gateway deployment exposes:
    - `GET /health`
    - `GET /v1/admin/geographic-areas`
    - `GET|POST /v1/admin/locations`
    - `POST /v1/admin/locations/geocode`
    - `GET|PUT|PATCH|DELETE /v1/admin/locations/{id}`
    - `GET /v1/admin/users`
    - `GET /v1/admin/instructors`
    - `GET /v1/admin/audit-logs` (optional `table`, `record_id`, `user_id`, `email`, `action`, `since`, `cursor`, `limit`)
    - `GET /v1/admin/audit-logs/{id}`
    - `GET|POST /v1/admin/services`
    - `GET /v1/admin/services/instances`
    - `GET|PUT|PATCH|DELETE /v1/admin/services/{id}`
    - `GET /v1/admin/services/{id}/discount-code-usage-summary`
    - `POST /v1/admin/services/{id}/cover-image`
    - `GET|POST /v1/admin/services/{id}/instances`
    - `GET|PUT|DELETE /v1/admin/services/{id}/instances/{instanceId}`
    - `GET|POST /v1/admin/services/{id}/instances/{instanceId}/enrollments`
    - `PATCH|DELETE /v1/admin/services/{id}/instances/{instanceId}/enrollments/{enrollmentId}`
    - `GET|POST /v1/admin/discount-codes`
    - `PUT|DELETE /v1/admin/discount-codes/{id}`
    - `GET|POST /v1/admin/calendar/manual-blocks` (GET requires `purpose`, `from`, `to`)
    - `GET|PATCH|DELETE /v1/admin/calendar/manual-blocks/{id}`
    - `GET|POST /v1/admin/tags` (optional `include_archived`, `archived_only`)
    - `GET|PATCH|DELETE /v1/admin/tags/{id}` (DELETE returns JSON with `deleted` and `usage_count`)
    - `GET /v1/admin/contacts/tags`
    - `GET /v1/admin/contacts/search`
    - `GET|POST /v1/admin/contacts`
    - `GET|PATCH|DELETE /v1/admin/contacts/{id}`
    - `GET|POST /v1/admin/contacts/{id}/notes`
    - `PATCH|DELETE /v1/admin/contacts/{id}/notes/{noteId}`
    - `GET /v1/admin/families/picker`
    - `GET|POST /v1/admin/families`
    - `GET|PATCH|DELETE /v1/admin/families/{id}`
    - `POST /v1/admin/families/{id}/members`
    - `PATCH|DELETE /v1/admin/families/{id}/members/{memberId}`
    - `GET /v1/admin/organizations/picker`
    - `GET|POST /v1/admin/organizations`
    - `GET|PATCH|DELETE /v1/admin/organizations/{id}`
    - `POST /v1/admin/organizations/{id}/members`
    - `PATCH /v1/admin/organizations/{id}/members/{memberId}`
    - `DELETE /v1/admin/organizations/{id}/members/{memberId}`
    - `GET|POST /v1/admin/expenses`
    - `POST /v1/admin/expenses/import-from-bulk-pdf` (returns **202** with a job id; poll `GET /v1/admin/expenses/bulk-import-jobs/{job_id}` until `succeeded`, `succeeded_with_errors`, or `failed`)
    - `GET /v1/admin/expenses/bulk-import-jobs` (creator-scoped list of recent jobs)
    - `GET /v1/admin/expenses/bulk-import-jobs/{job_id}`
    - `GET|PATCH|DELETE /v1/admin/expenses/{id}`
    - `POST /v1/admin/expenses/{id}/cancel`
    - `POST /v1/admin/expenses/{id}/mark-paid`
    - `POST /v1/admin/expenses/{id}/reparse`
    - `POST /v1/admin/expenses/{id}/amend`
    - `GET /v1/admin/billing/export`
    - `GET|POST /v1/admin/billing/payments` (list supports optional `?invoice_id=` to return
      payments with an allocation to that invoice; `POST` creates either a refund row
      (`direction: refund`) or a manual inbound customer payment (`direction: inbound` + `enrollmentId`))
    - `GET /v1/admin/billing/payments/{id}` (includes `allocationInvoices` for linked issued invoices)
    - `GET /v1/admin/billing/payments/{id}/unapplied`
    - `POST /v1/admin/billing/payments/{id}/confirm`
    - `GET /v1/admin/billing/enrollments/recent-for-invoicing`
    - `GET|POST /v1/admin/billing/invoices` (GET optional `status`, `currency`, `cursor`, `limit`; POST is either enrollment-based draft (`draftKind: enrollment_merge`, `enrollmentIds`, `currency` optional when derivable) or customized draft (`draftKind: customized_manual`, `billTo`, `currency`, `lines`); see request schemas)
    - `GET|DELETE /v1/admin/billing/invoices/{id}` (`DELETE` removes **draft** invoices only)
    - `GET /v1/admin/billing/invoices/{id}/pdf`
    - `POST /v1/admin/billing/invoices/{id}/issue`
    - `POST /v1/admin/billing/invoices/{id}/void`
    - `POST /v1/admin/billing/invoices/{id}/email`
    - `POST /v1/admin/billing/allocations`
    - `GET|POST /v1/admin/leads`
    - `GET|PATCH /v1/admin/leads/{id}`
    - `POST /v1/admin/leads/{id}/notes`
    - `GET /v1/admin/leads/analytics`
    - `GET /v1/admin/leads/export`
    - `GET|POST /v1/admin/assets`
    - `GET|PUT|PATCH|DELETE /v1/admin/assets/{id}`
    - `POST /v1/admin/assets/{id}/content/init`
    - `POST /v1/admin/assets/{id}/content/complete`
    - `GET|POST /v1/admin/assets/{id}/grants`
    - `DELETE /v1/admin/assets/{id}/grants/{grantId}`
    - `GET|POST|DELETE /v1/admin/assets/{id}/share-link`
    - `POST /v1/admin/assets/{id}/share-link/rotate`
    - `GET /v1/user/assets`
    - `GET /v1/user/assets/{id}/download`

servers:
  - url: https://api.evolvesprouts.com
    description: Production custom domain (when configured)
  - url: https://{restApiId}.execute-api.{region}.amazonaws.com/prod
    description: API Gateway invoke URL
    variables:
      restApiId:
        default: example
      region:
        default: ap-southeast-1

paths:
  /health:
    get:
      summary: Health check
      description: Returns backend health status and dependency checks.
      security:
        - SigV4Auth: []
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Service is unhealthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /v1/admin/assets:
    get:
      summary: List admin assets
      description: Admin-only route for listing managed assets.
      security:
        - AdminBearerAuth: []
      parameters:
        - name: query
          in: query
          required: false
          schema:
            type: string
          description: Case-insensitive match on title, file name, or resource key.
        - name: visibility
          in: query
          required: false
          schema:
            type: string
            enum: [public, restricted]
        - name: asset_type
          in: query
          required: false
          schema:
            type: string
            enum: [guide, video, pdf, document]
        - name: tag_name
          in: query
          required: false
          schema:
            type: string
            maxLength: 100
          description: >
            When set, return only assets that have this tag (case-insensitive name match).
            The tag must be linked to at least one asset that matches the optional asset_type filter.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Asset list response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      summary: Create admin asset
      description: Admin-only route for creating an asset.
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetRequest"
      responses:
        "201":
          description: Asset create response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAssetResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/assets/{id}:
    parameters:
      - $ref: "#/components/parameters/AssetId"
    get:
      summary: Get admin asset
      security:
        - AdminBearerAuth: []
      responses:
        "200":
          description: Asset response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update admin asset
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAssetRequest"
      responses:
        "200":
          description: Asset update response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      summary: Partially update admin asset
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartialUpdateAssetRequest"
      responses:
        "200":
          description: Asset update response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete admin asset
      security:
        - AdminBearerAuth: []
      responses:
        "204":
          description: Asset deleted.
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/assets/{id}/content/init:
    parameters:
      - $ref: "#/components/parameters/AssetId"
    post:
      summary: Begin admin asset file replacement
      description: >
        Step 1 of 2 for replacing the binary stored for an asset while keeping the same asset id.
        Returns a presigned upload URL for a new S3 key under `assets/{id}/...`. Call
        `POST /v1/admin/assets/{id}/content/complete` after the client uploads to that URL.
        Not allowed when the asset has the `expense_attachment` tag (400). The presigned PUT binds
        `Content-Type: application/pdf` regardless of optional `content_type` in the body.
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitAssetContentReplaceRequest"
      responses:
        "200":
          description: Presigned upload details and pending object key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InitAssetContentReplaceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/assets/{id}/content/complete:
    parameters:
      - $ref: "#/components/parameters/AssetId"
    post:
      summary: Complete admin asset file replacement
      description: >
        Step 2 of 2: verifies the object exists at `pending_s3_key`, updates the asset to point at it,
        deletes the previous S3 object, and returns the updated asset. The `pending_s3_key` must be
        the value returned by `POST .../content/init` for this asset id. Not allowed when the asset
        has the `expense_attachment` tag (400).
        `file_name` must match the filename embedded in `pending_s3_key` after server-side sanitization
        (same rules as init). The object name segment must begin with a standard UUID prefix
        (`xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx-`) from init. Stored `content_type` is always
        `application/pdf`; the uploaded object's S3 Content-Type and size are validated on complete
        (max 50 MiB). This call is not idempotent across different `pending_s3_key` values: repeating
        complete with a stale key after a successful replace returns 400. Concurrent replaces for the
        same asset are last-writer-wins; earlier pending keys may become orphans if never completed.
        BadRequest responses may include `field` values such as `pending_s3_key`, `file_name`,
        `content_type`, or `asset` depending on the failure.
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteAssetContentReplaceRequest"
      responses:
        "200":
          description: Updated asset after successful replacement.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/assets/{id}/grants:
    parameters:
      - $ref: "#/components/parameters/AssetId"
    get:
      summary: List asset grants
      security:
        - AdminBearerAuth: []
      responses:
        "200":
          description: Grant list response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetGrantListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      summary: Create asset grant
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetGrantRequest"
      responses:
        "201":
          description: Grant create response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetGrantResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/assets/{id}/grants/{grantId}:
    parameters:
      - $ref: "#/components/parameters/AssetId"
      - $ref: "#/components/parameters/GrantId"
    delete:
      summary: Delete asset grant
      security:
        - AdminBearerAuth: []
      responses:
        "204":
          description: Grant deleted.
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/assets/{id}/share-link:
    parameters:
      - $ref: "#/components/parameters/AssetId"
    get:
      summary: Get stable asset share link
      security:
        - AdminBearerAuth: []
      responses:
        "200":
          description: Existing share link returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetShareLinkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      summary: Get or create stable asset share link
      security:
        - AdminBearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetShareLinkPolicyRequest"
      responses:
        "200":
          description: Existing share link returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetShareLinkResponse"
        "201":
          description: Share link created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetShareLinkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Revoke stable asset share link
      security:
        - AdminBearerAuth: []
      responses:
        "204":
          description: Share link revoked.
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/assets/{id}/share-link/rotate:
    parameters:
      - $ref: "#/components/parameters/AssetId"
    post:
      summary: Rotate stable asset share link
      security:
        - AdminBearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetShareLinkPolicyRequest"
      responses:
        "200":
          description: Share link rotated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetShareLinkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/geographic-areas:
    get:
      summary: List geographic areas
      description: |
        Returns geographic areas used for address/location selection.
        Use `parent_id` to fetch direct children, or `flat=true` to return a
        flattened tree.
      security:
        - AdminBearerAuth: []
      parameters:
        - name: parent_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: flat
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: active_only
          in: query
          required: false
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Geographic area list response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeographicAreaListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/locations:
    get:
      summary: List locations
      security:
        - AdminBearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: area_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: search
          in: query
          required: false
          description: Case-insensitive substring match on location name or address.
          schema:
            type: string
            maxLength: 500
        - name: exclude_addresses
          in: query
          required: false
          description: |
            When `true`, omit locations linked as the saved venue for a non-archived
            family or organisation (so Services → Venues lists only service-oriented
            venues). Partner organisations are still included when they use the same
            location row; those rows remain visible with partner lock metadata.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Location list response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      summary: Create location
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLocationRequest"
      responses:
        "201":
          description: Location create response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/locations/geocode:
    post:
      summary: Geocode a venue address
      description: |
        Resolves latitude and longitude using OpenStreetMap's public geocoder via
        the AWS HTTP proxy. The free-text query uses the submitted address with
        unit/floor prefixes removed through the first comma-separated segment
        that contains ``/F`` (case-insensitive), e.g. ``G/F`` or ``5/F``. District
        and country names from the
        geographic area are not appended. The ``countrycodes`` query parameter is
        built from the root area ISO code plus the sovereign country row's code
        when ``sovereign_country_id`` is set (see ``GET /v1/admin/geographic-areas``).
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeocodeLocationRequest"
      responses:
        "200":
          description: Geocoding result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeocodeLocationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          description: Geocoding provider or proxy error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Geocoding is not configured (for example missing proxy or headers).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/locations/{id}:
    parameters:
      - $ref: "#/components/parameters/LocationId"
    get:
      summary: Get location
      security:
        - AdminBearerAuth: []
      responses:
        "200":
          description: Location response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update location
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLocationRequest"
      responses:
        "200":
          description: Location update response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      summary: Partially update location
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartialUpdateLocationRequest"
      responses:
        "200":
          description: Location update response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete location
      security:
        - AdminBearerAuth: []
      responses:
        "204":
          description: Location deleted.
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Location is linked to an active partner organisation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/admin/users:
    get:
      summary: List admin users
      description: Returns users in the admin Cognito group for assignee selection.
      security:
        - AdminBearerAuth: []
      responses:
        "200":
          description: Admin user list response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListResponse"
        "400":
