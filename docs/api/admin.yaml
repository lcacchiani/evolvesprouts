            format: uuid
        training_details:
          $ref: "#/components/schemas/ServiceTrainingDetails"
        event_details:
          $ref: "#/components/schemas/ServiceEventDetails"
        consultation_details:
          $ref: "#/components/schemas/ServiceConsultationDetails"
    UpdateServiceRequest:
