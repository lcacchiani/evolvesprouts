          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Load failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Persist one poll question answer (direct API path)
      description: >
        Upserts a single question answer for a training-site poll session.
        Used by `apps/training` when the respondent advances to the next question.
        Answers are stored in the shared DynamoDB table `evolvesprouts-poll-responses`
        (partition key `POLL#<poll_slug>`, sort key `SESSION#<session_id>#Q#<question_id>`).
        Re-submitting the same session and question overwrites the prior row.
        Identical re-submits (same answer payload) return `200` without a new
        DynamoDB write and do not consume the per-session write counter.
        Submissions are rejected with `409` when the facilitator has not enabled
        the question (`error`: `question_not_open`), when no questions are open
        (`poll_not_accepting_answers`), or when `selectedOption` /
        `selectedOptions` are not members of the facilitator-published option
        list for that question (`option_not_allowed`; skipped when control state
        has no `questionOptions`). Per-session write counters in DynamoDB use a
        fixed one-hour bucket (`RATELIMIT#SESSION#<session_id>#W#<epoch//3600>`)
        and return `429` (`poll_write_rate_limit_exceeded`) when exceeded; stale
        buckets are garbage-collected via TTL on `expiresAt` (lazy deletion).
        Requires API key; Turnstile is not used on this route.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: poll_slug
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          description: Poll identifier (for example `workshop-food-jun-26`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PollAnswerPutRequest"
      responses:
        "200":
          description: Answer persisted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PollAnswerPutResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: >
            Question not open for responses, option not allowed, or poll not
            accepting answers. Body `error` is `question_not_open`,
            `option_not_allowed`, or `poll_not_accepting_answers`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Poll answer write rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Poll path not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Persistence failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

