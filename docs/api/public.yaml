openapi: 3.0.3
info:
  title: Public API
  version: 0.4.0
  description: |
    Public endpoint contract.

    Public GET responses that are intended for CloudFront edge caching on the
    public website ``/www/*`` proxy emit ``Cache-Control`` headers (success: shared
    cache TTL; errors: ``no-store``). Handlers must keep this contract when new
    allowlisted GET routes are added.

    This spec covers:
    - Public asset endpoints exposed by the backend API stack
      (`/v1/assets/public*`, `/v1/assets/share/*`, `/v1/assets/email-download/*`,
      `/v1/assets/free`).
    - Public free-asset listing for the website (`/v1/assets/free`, `/www/v1/assets/free`).
    - Public calendar feed (`/v1/calendar/public`, `/www/v1/calendar/public`).
    - Public calendar availability (`/v1/calendar/availability`, `/www/v1/calendar/availability`).
    - Media lead capture (`/v1/assets/free/request`, `/www/v1/assets/free/request`).
    - Training form answer persistence (`PUT /v1/forms/{form_slug}/answers`,
      `/www/v1/forms/{form_slug}/answers`) for `apps/training` (DynamoDB; API key only).
    - Training poll answer persistence (`PUT /v1/polls/{poll_slug}/answers`,
      `/www/v1/polls/{poll_slug}/answers`) and session resume
      (`GET /v1/polls/{poll_slug}/answers?sessionId=…`, same `/www` prefix),
      facilitator control
      (`GET`/`PUT /v1/polls/{poll_slug}/control`, `/www/.../control`), and live
      per-question aggregates (`GET /v1/polls/{poll_slug}/questions/{question_id}/results`,
      `/www/...`) for `apps/training` (DynamoDB; API key only).
    - Public website endpoints consumed by `apps/public_www`, exposed via the
      CloudFront `/www/*` proxy allowlist in
      `backend/infrastructure/lib/public-www-stack.ts`.

servers:
  - url: https://api.evolvesprouts.com
    description: Direct API origin
  - url: https://www.evolvesprouts.com
    description: Public website (same-origin `/www/*` proxy path)
  - url: https://www-staging.evolvesprouts.com
    description: Staging public website (same-origin `/www/*` proxy path)
  - url: https://training.evolvesprouts.com
    description: Training website (same-origin `/www/*` proxy path; not indexed)

paths:
  /v1/assets/public:
    get:
      summary: List public assets
      description: Public asset listing route guarded by device attestation and API key.
      security:
        - ApiKeyAuth: []
          DeviceAttestation: []
      responses:
        "200":
          description: Public asset list response payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicAssetListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/assets/public/{id}/download:
    parameters:
      - $ref: "#/components/parameters/AssetId"
    get:
      summary: Generate public asset download
      security:
        - ApiKeyAuth: []
          DeviceAttestation: []
      responses:
        "200":
          description: Public asset download response payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicAssetDownloadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/assets/share/{token}:
    parameters:
      - $ref: "#/components/parameters/ShareToken"
    get:
      summary: Resolve stable asset share link
      description: |
        Public bearer endpoint that resolves a stable share token and redirects
        to a fresh CloudFront-signed download URL.
        Requests are authenticated with API key at API Gateway; CloudFront
        forwards the request and injects `x-api-key` for end users.
        Resolution is allowed only when the request carries a Referer/Origin
        header matching the asset's admin-configured domain allowlist.
        If the linked asset is `restricted`, the request must also include a
        valid Cognito JWT in the `Authorization` header.
      security:
        - ApiKeyAuth: []
      responses:
        "302":
          description: Redirect to signed download URL.
          headers:
            Location:
              description: CloudFront-signed download URL.
              schema:
                type: string
                format: uri
        "404":
          $ref: "#/components/responses/NotFound"
        "403":
          $ref: "#/components/responses/Forbidden"
        "401":
          description: Authentication required for restricted asset share links.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/assets/email-download/{token}:
    parameters:
      - $ref: "#/components/parameters/ShareToken"
    get:
      summary: Resolve stable asset share link for email
      description: |
        Same token resolution as `/v1/assets/share/{token}` but intended for
        links opened from email clients: no Referer/Origin domain allowlist check.
        API key is still required at API Gateway; CloudFront injects `x-api-key`.
        If the linked asset is `restricted`, the request must include a valid
        Cognito JWT in the `Authorization` header.
      security:
        - ApiKeyAuth: []
      responses:
        "302":
          description: Redirect to signed download URL.
          headers:
            Location:
              description: CloudFront-signed download URL.
              schema:
                type: string
                format: uri
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          description: Authentication required for restricted asset share links.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/mailchimp/webhook:
    get:
      summary: Mailchimp webhook URL verification
      description: |
        Lightweight endpoint that Mailchimp calls with a GET request when
        validating the webhook URL during webhook creation.  Returns 200
        with no side-effects.
      responses:
        "200":
          description: Verification acknowledged.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationSubmissionAccepted"
    post:
      summary: Receive Mailchimp audience webhook event
      description: |
        Public webhook endpoint for Mailchimp audience events.
        Requests must include a shared secret token in the `token` query
        parameter, and payloads are submitted as
        `application/x-www-form-urlencoded`.
      parameters:
        - $ref: "#/components/parameters/MailchimpWebhookToken"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/MailchimpWebhookRequest"
      responses:
        "200":
          description: Webhook processed or ignored.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationSubmissionAccepted"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Missing or invalid webhook token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/assets/free:
    get:
      summary: List public free website assets
      description: |
        Lists **public** assets tagged `client_document` for the public website.
        Optional `language` filters to assets whose `content_language` matches exactly
        (BCP 47-style tag, e.g. `en`, `zh-HK`). Omitted `language` returns all matches,
        including rows with null `content_language`.
        Download files via `GET /v1/assets/public/{id}/download` (device attestation required).
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ClientResourceLanguage"
        - $ref: "#/components/parameters/ListLimit"
        - $ref: "#/components/parameters/ListCursor"
      responses:
        "200":
          description: Client resource list response.
          headers:
            Cache-Control:
              schema:
                type: string
              description: >
                `public, max-age=60, s-maxage=300, stale-while-revalidate=600` for
                CloudFront edge caching on `/www/*` (TTL capped by cache policy).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicClientResourceListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/PublicWebsiteCacheableGetNotFound"
        "405":
          $ref: "#/components/responses/PublicWebsiteCacheableGetMethodNotAllowed"

  /www/v1/assets/free:
    get:
      summary: List public free website assets (website proxy path)
      description: Same as `GET /v1/assets/free` for same-origin calls from `public_www`.
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ClientResourceLanguage"
        - $ref: "#/components/parameters/ListLimit"
        - $ref: "#/components/parameters/ListCursor"
      responses:
        "200":
          description: Client resource list response.
          headers:
            Cache-Control:
              schema:
                type: string
              description: >
                `public, max-age=60, s-maxage=300, stale-while-revalidate=600` for
                CloudFront edge caching on `/www/*` (TTL capped by cache policy).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicClientResourceListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/PublicWebsiteCacheableGetNotFound"
        "405":
          $ref: "#/components/responses/PublicWebsiteCacheableGetMethodNotAllowed"

  /v1/calendar/public:
    get:
      summary: List public calendar events
      description: |
        Calendar feed for public consumers (direct API).
        Source of truth is the backend `service_instances` projection for
        published `event` and `training_course` services (consultation is never
        included). Instances with an empty `service_instances.slug` are
        omitted from this feed.

        Visibility: each instance must either have at least one session slot with
        `ends_at` not before the server clock (upcoming or in progress), **or**
        (only when the parent service type is `event`) have all slots ended with the
        latest `ends_at` within the prior 90 days. Fully concluded `training_course`
        instances are never returned on this feed.

        Results are ordered by the earliest upcoming session slot,
        then `service_instances.id` for a stable tie-break (finished `event` rows
        sort with a null earliest-upcoming value).

        Optional filters: `service_type`, `slug`, `service_key`. Filters
        combine via logical AND; contradictory combinations return `events: []`.

        Each returned event includes `slug` and `service_key` (nullable) from the
        parent service; together they identify the bookable instance for
        `POST /v1/discounts/validate` and `POST /v1/reservations`.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: service_type
          in: query
          required: false
          schema:
            type: string
            enum: [event, training_course]
          description: >
            Restrict feed to one service type. Omitted = both event and
            training_course are returned (finished-event lookback applies only to
            `event`). Consultation is never exposed.
        - name: slug
          in: query
          required: false
          schema:
            type: string
            maxLength: 128
            pattern: ^[a-z0-9]+(-[a-z0-9]+)*$
          description: >
            Filter results to at most one instance whose
            `service_instances.slug` matches the provided slug case-insensitively.
            Invalid or empty values are silently ignored.
        - name: service_key
          in: query
          required: false
          schema:
            type: string
            maxLength: 80
            pattern: ^[a-z0-9]+(-[a-z0-9]+)*$
          description: >
            Restrict the feed to instances of a single service whose key matches
            `service_key` case-insensitively against `services.service_key` in Aurora
            (e.g. `my-best-auntie-training-course`). Combines with `service_type` and
            `slug` via logical AND; contradictory combinations return
            `events: []`. Unknown keys return `events: []`. Invalid values
            (wrong shape, too long) are silently ignored and the filter is not
            applied, consistent with `service_type` and `slug`.
            Same case-insensitive `services.service_key` mapping as the `service_key` field
            on `POST /v1/discounts/validate` (JSON body), not the same parameter surface.
      responses:
        "200":
          description: Event list response.
          headers:
            Cache-Control:
              schema:
                type: string
              description: >
                `public, max-age=60, s-maxage=300, stale-while-revalidate=600` for
                CloudFront edge caching on `/www/*` (TTL capped by cache policy).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicCalendarEventsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/PublicWebsiteCacheableGetNotFound"
        "405":
          $ref: "#/components/responses/PublicWebsiteCacheableGetMethodNotAllowed"

  /www/v1/calendar/public:
    get:
      summary: List public website events
      description: |
        Same as `GET /v1/calendar/public` for same-origin calls from `public_www`.
        Source of truth is the backend `service_instances` projection for
        published `event` and `training_course` services (consultation is never
        included). Instances with an empty `service_instances.slug` are
        omitted from this feed.

        Visibility: each instance must either have at least one session slot with
        `ends_at` not before the server clock (upcoming or in progress), **or**
        (only when the parent service type is `event`) have all slots ended with the
        latest `ends_at` within the prior 90 days. Fully concluded `training_course`
        instances are never returned on this feed.

        Results are ordered by the earliest upcoming session slot,
        then `service_instances.id` for a stable tie-break (finished `event` rows
        sort with a null earliest-upcoming value).

        Optional filters: `service_type`, `slug`, `service_key`. Filters
        combine via logical AND; contradictory combinations return `events: []`.

        Each returned event includes `slug` and `service_key` (nullable) from the
        parent service; together they identify the bookable instance for
        `POST /v1/discounts/validate` and `POST /v1/reservations`.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: service_type
          in: query
          required: false
          schema:
            type: string
            enum: [event, training_course]
          description: >
            Restrict feed to one service type. Omitted = both event and
            training_course are returned (finished-event lookback applies only to
            `event`). Consultation is never exposed.
        - name: slug
          in: query
          required: false
          schema:
            type: string
            maxLength: 128
            pattern: ^[a-z0-9]+(-[a-z0-9]+)*$
          description: >
            Filter results to at most one instance whose
            `service_instances.slug` matches the provided slug case-insensitively.
            Invalid or empty values are silently ignored.
        - name: service_key
          in: query
          required: false
          schema:
            type: string
            maxLength: 80
            pattern: ^[a-z0-9]+(-[a-z0-9]+)*$
          description: >
            Restrict the feed to instances of a single service whose key matches
            `service_key` case-insensitively against `services.service_key` in Aurora
            (e.g. `my-best-auntie-training-course`). Combines with `service_type` and
            `slug` via logical AND; contradictory combinations return
            `events: []`. Unknown keys return `events: []`. Invalid values
            (wrong shape, too long) are silently ignored and the filter is not
            applied, consistent with `service_type` and `slug`.
            Same case-insensitive `services.service_key` mapping as the `service_key` field
            on `POST /v1/discounts/validate` (JSON body), not the same parameter surface.
      responses:
        "200":
          description: Event list response.
          headers:
            Cache-Control:
              schema:
                type: string
              description: >
                `public, max-age=60, s-maxage=300, stale-while-revalidate=600` for
                CloudFront edge caching on `/www/*` (TTL capped by cache policy).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicCalendarEventsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/PublicWebsiteCacheableGetNotFound"
        "405":
          $ref: "#/components/responses/PublicWebsiteCacheableGetMethodNotAllowed"

  /v1/calendar/availability:
    get:
      summary: Public calendar availability (slot intervals + meta)
      description: |
        Returns discrete bookable UTC intervals (`slots`) plus `meta` for the requested `purpose`.

        **`consultation_booking`:** Half-day blocks Mon–Fri local (`Asia/Hong_Kong` via
        `CALENDAR_BLOCKERS_WALL_TIMEZONE`): morning `[09:00,12:00)` and afternoon `[14:00,18:00)`.
        Two calendar days minimum lead from today’s local date; maximum horizon defaults and caps at 120 days.
        Success responses use `Cache-Control: no-store`.

        **`intro_call_booking`:** 15-minute calls on a 30-minute cadence Mon–Fri 09:00–18:00 local intro-call wall zone.
        Two-hour lead time; default horizon 21 days; range span capped at 28 days; `from` not more than 35 days ahead.
        Success responses use the standard shared-cache GET headers for `/www/*`.

        **`from` / `to`:** Optional inclusive `YYYY-MM-DD` dates (strict validation). When omitted, `from`
        defaults to today in the purpose wall zone and `to` defaults to `from + default_horizon_days`.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: purpose
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/PublicCalendarAvailabilityPurpose"
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Inclusive range start (`YYYY-MM-DD`).
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Inclusive range end (`YYYY-MM-DD`).
      responses:
        "200":
          description: Availability envelope.
          headers:
            Cache-Control:
              schema:
                type: string
              description: >
                `no-store` for `purpose=consultation_booking`. For `intro_call_booking`, the same
                value as other public cacheable GETs: `public, max-age=60, s-maxage=300, stale-while-revalidate=600`
                (TTL capped by cache policy on `/www/*`). Errors use `no-store`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicCalendarAvailabilityResponse"
        "400":
          $ref: "#/components/responses/PublicWebsiteCacheableGetBadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "405":
          $ref: "#/components/responses/PublicWebsiteCacheableGetMethodNotAllowed"

  /www/v1/calendar/availability:
    get:
      summary: Public calendar availability (website proxy path)
      description: Same as `GET /v1/calendar/availability` for same-origin calls from `public_www`.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: purpose
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/PublicCalendarAvailabilityPurpose"
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Availability envelope.
          headers:
            Cache-Control:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicCalendarAvailabilityResponse"
        "400":
          $ref: "#/components/responses/PublicWebsiteCacheableGetBadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "405":
          $ref: "#/components/responses/PublicWebsiteCacheableGetMethodNotAllowed"

  /v1/discounts/validate:
    post:
      summary: Validate discount code (native)
      description: |
        Validates an admin-managed discount code against Aurora (`discount_codes`).
        Request and successful response shapes match historical public booking clients.

        Validity window: when `valid_from` / `valid_until` are set on the code, validation
        succeeds only while the server UTC instant is **on or after** `valid_from` and
        **on or before** `valid_until` (both ends inclusive).

        **Identity:** requests always include `service_key`. When `service_instance_slug`
        is present and non-empty, it resolves with `service_key` to a real `service_instances`
        row whose parent service's `services.service_key` matches `service_key` case-insensitively;
        otherwise **404** with `rejection_reason` `unknown_service_instance_slug` or
        `service_key_instance_mismatch` (same generic `error` message as inactive codes).
        When `service_instance_slug` is omitted or blank, identity is **service-key-only**:
        the handler resolves the `services` row by `service_key`. Unknown keys return **404**
        with `rejection_reason` `unknown_service_key`.

        **Service scoping:** codes may be limited to a service and/or instance in Aurora.
        Unscoped codes (no `service_id` / `instance_id`) validate as long as identity resolves.
        When the code is scoped to a **service only**, `services.service_key` must match the
        resolved parent service. When scoped to an **instance**, `service_instance_slug` must be
        supplied and must match the resolved instance (instance-scoped codes reject service-key-only requests).
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscountValidationRequest"
      responses:
        "200":
          description: Discount validation response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscountValidationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: >
            Code not found, inactive, expired, fully used, or identity/scoping mismatch.
            When `rejection_reason` is present it may be `unknown_service_instance_slug`,
            `service_key_instance_mismatch`, or `unknown_service_key`
            (other rejections use the same generic body without this field).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /www/v1/discounts/validate:
    post:
      summary: Validate discount code (native, website proxy path)
      description: |
        Same as `POST /v1/discounts/validate` for same-origin calls from `public_www`.
        Validity window boundaries are inclusive on both `valid_from` and `valid_until` (UTC).
        Service and instance scoping rules match the `/v1/discounts/validate` description.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscountValidationRequest"
      responses:
        "200":
          description: Discount validation response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscountValidationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: >
            Code not found, inactive, expired, fully used, or identity/scoping mismatch.
            When `rejection_reason` is present it may be `unknown_service_instance_slug`,
            `service_key_instance_mismatch`, or `unknown_service_key`
            (other rejections use the same generic body without this field).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/contact-us:
    post:
      summary: Submit contact-us form (direct API path)
      description: >
        Accepts contact-us, community newsletter, and event-notification signups from
        `public_www`. Requires Turnstile. Persists to Aurora (contact; sales lead
        for `contact_inquiry` only), then runs best-effort SES confirmation (skipped
        for newsletter/event-notification intents), optional Mailchimp subscribe,
        sales recap, and `SUPPORT_EMAIL` notification for `contact_inquiry`.
        Returns **500** when persistence fails. If hooks fail after commit, the API
        still returns **202** (data is saved).
      security:
        - ApiKeyAuth: []
          TurnstileToken: []
      parameters:
        - $ref: "#/components/parameters/TurnstileTokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactUsSubmissionRequest"
      responses:
        "202":
          description: Contact submission accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationSubmissionAccepted"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "405":
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Persistence failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /www/v1/contact-us:
    post:
      summary: Submit contact-us form (website proxy path)
      description: Same as `POST /v1/contact-us` for same-origin calls from `public_www`.
      security:
        - ApiKeyAuth: []
          TurnstileToken: []
      parameters:
        - $ref: "#/components/parameters/TurnstileTokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactUsSubmissionRequest"
      responses:
        "202":
          description: Contact submission accepted.
          content:
            application/json:
              schema:
